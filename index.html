<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Concierge">
<title>Concierge Familiar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root { --gc: #E8A87C; }
body { background: #F5F0E8; font-family: 'DM Sans', sans-serif; overscroll-behavior: none; }
#app { min-height: 100vh; background: #F5F0E8; padding: 0 0 80px; }
.header { background: #1C1C1E; padding: 20px 20px 0; padding-top: max(env(safe-area-inset-top,16px), 28px); }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.header-title { font-family: 'Playfair Display', serif; color: #F5F0E8; font-size: 24px; font-weight: 700; line-height: 1.2; }
.header-sub { color: #888; font-size: 12px; margin-top: 3px; }
.sync-badge { font-size: 11px; padding: 5px 10px; border-radius: 20px; font-weight: 500; border: 1px solid #3C3C3E; white-space: nowrap; background: #2C2C2E; color: #85C1A3; }
.sync-badge.syncing { color: #F7D070; }
.sync-badge.offline { color: #C07070; }
.groups-nav { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; padding-bottom: 0; }
.groups-nav::-webkit-scrollbar { display: none; }
.group-tab { flex-shrink: 0; padding: 9px 14px; border-radius: 12px 12px 0 0; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; background: #2C2C2E; color: #888; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
.group-tab.active { color: #1C1C1E; font-weight: 700; }
.content { padding: 20px 16px; }
.sync-note { background: #1C1C1E; border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.sync-note-text { font-size: 12px; color: #888; line-height: 1.5; }
.sync-note-text strong { color: #F5F0E8; }
.stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
.stat-card { flex: 1; background: #fff; border-radius: 14px; padding: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); text-align: center; }
.stat-num { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--gc); }
.stat-lbl { font-size: 11px; color: #AAA; font-weight: 500; margin-top: 2px; }
.house-selector { background: #fff; border-radius: 16px; padding: 14px 16px; margin-bottom: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
.house-selector-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #AAA; text-transform: uppercase; margin-bottom: 10px; }
.house-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.house-btn { padding: 7px 14px; border-radius: 20px; border: 1.5px solid #E8E0D8; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; color: #888; transition: all 0.2s; }
.house-btn.active { background: var(--gc); border-color: var(--gc); color: #1C1C1E; font-weight: 700; }
.travel-header { background: linear-gradient(135deg, #2C2050 0%, #1C1C1E 100%); border-radius: 18px; padding: 16px 18px; margin-bottom: 16px; border: 1px solid #3D3560; }
.travel-header-title { font-family: 'Playfair Display', serif; color: #B5A8D8; font-size: 16px; font-weight: 700; margin-bottom: 10px; }
.travel-name-input { width: 100%; background: #1C1C1E; border: 1.5px solid #3D3560; border-radius: 10px; padding: 9px 14px; color: #F5F0E8; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; margin-bottom: 10px; }
.travel-cats, .health-cats { display: flex; flex-wrap: wrap; gap: 6px; }
.travel-cat-btn, .health-cat-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid #3D3560; background: transparent; color: #888; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.travel-cat-btn.active { background: #B5A8D8; border-color: #B5A8D8; color: #1C1C1E; font-weight: 600; }
.health-header { background: linear-gradient(135deg, #0D3030 0%, #1C1C1E 100%); border-radius: 18px; padding: 16px 18px; margin-bottom: 16px; border: 1px solid #1E5050; }
.health-header-title { color: #7EC8C8; font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.health-cat-btn.active { background: #7EC8C8; border-color: #7EC8C8; color: #0D2020; font-weight: 600; }
.add-section { background: #fff; border-radius: 18px; padding: 16px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.add-row { display: flex; gap: 8px; align-items: center; }
.add-input { flex: 1; border: 1.5px solid #E8E0D8; border-radius: 12px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: #FAFAF8; outline: none; color: #1C1C1E; }
.add-input:focus { border-color: var(--gc); }
.add-input::placeholder { color: #BBBBB0; }
.add-btn { width: 44px; height: 44px; border-radius: 13px; border: none; background: var(--gc); color: #1C1C1E; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s; }
.add-btn:active { transform: scale(0.92); }
.assignee-row, .due-date-row, .address-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.assignee-label, .due-date-label, .address-label { font-size: 12px; color: #999; font-weight: 500; white-space: nowrap; }
.assignee-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid #E8E0D8; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; color: #666; transition: all 0.2s; }
.assignee-btn.active { background: var(--gc); border-color: var(--gc); color: #1C1C1E; font-weight: 600; }
.due-date-input { border: 1.5px solid #E8E0D8; border-radius: 10px; padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: #FAFAF8; outline: none; color: #555; flex: 1; }
.due-date-input:focus { border-color: var(--gc); }
.time-input { width: 110px; flex: none !important; }
.cal-toggle { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 12px; color: #999; cursor: pointer; }
.cal-toggle input { accent-color: var(--gc); }
.address-input { flex: 1; border: 1.5px solid #E8E0D8; border-radius: 10px; padding: 7px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: #FAFAF8; outline: none; color: #555; }
.address-input:focus { border-color: var(--gc); }
.notes-row { margin-top: 10px; }
.notes-input { width: 100%; border: 1.5px solid #E8E0D8; border-radius: 10px; padding: 8px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: #FAFAF8; outline: none; resize: none; color: #555; min-height: 60px; }
.notes-input:focus { border-color: var(--gc); }
.notes-input::placeholder { color: #BBBBB0; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; color: #AAA; text-transform: uppercase; margin-bottom: 8px; margin-top: 4px; }
.task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.task-card { background: #fff; border-radius: 14px; padding: 14px; display: flex; flex-direction: column; align-items: stretch; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
.task-card.done { opacity: 0.5; }
.task-row { display: flex; align-items: center; gap: 10px; }
.check-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--gc); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.2s; font-size: 12px; color: #1C1C1E; }
.check-btn.done { background: var(--gc); }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 14px; color: #1C1C1E; font-weight: 400; line-height: 1.4; }
.task-text.done { text-decoration: line-through; color: #AAA; }
.task-meta { font-size: 11px; color: #BBBBB0; margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
.meta-tag { background: #F5F0E8; border-radius: 6px; padding: 1px 7px; font-weight: 500; }
.due-tag { border-radius: 6px; padding: 1px 7px; font-weight: 500; font-size: 11px; background: #FFF0E8; color: #C07040; }
.due-tag.overdue { background: #FFE8E8; color: #C04040; }
.due-tag.done-tag { background: #E8F5EE; color: #3A9060; }
.house-tag { font-size: 11px; border-radius: 6px; padding: 1px 7px; font-weight: 600; background: #F5F0E8; color: #888; }
.delete-btn { background: none; border: none; color: #D0C8C0; cursor: pointer; font-size: 16px; padding: 4px; flex-shrink: 0; }
.task-address { margin-top: 6px; }
.map-link { font-size: 12px; color: #4A90D9; text-decoration: none; background: #EEF4FC; border-radius: 6px; padding: 3px 10px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
.task-notes { margin-top: 6px; font-size: 12px; color: #888; line-height: 1.5; background: #F9F7F4; border-radius: 8px; padding: 7px 10px; border-left: 3px solid var(--gc); cursor: pointer; }
.task-notes-label { font-size: 10px; color: #AAA; display: block; margin-bottom: 2px; }
.add-note-btn { background: none; border: none; font-size: 12px; color: #BBBBB0; cursor: pointer; margin-top: 4px; padding: 2px 0; }
.notes-edit-input { width: 100%; border: 1.5px solid var(--gc); border-radius: 8px; padding: 6px 10px; font-family: 'DM Sans', sans-serif; font-size: 12px; background: #FAFAF8; outline: none; resize: none; color: #444; min-height: 50px; margin-top: 6px; }
.note-actions { display: flex; gap: 8px; margin-top: 6px; }
.note-save { flex: 1; padding: 6px; border-radius: 8px; border: none; background: var(--gc); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; }
.note-cancel { padding: 6px 12px; border-radius: 8px; border: 1.5px solid #E8E0D8; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; color: #888; }
.empty { text-align: center; padding: 32px 20px; color: #C0B8B0; font-size: 14px; }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.travel-group-section { margin-bottom: 20px; }
.travel-trip-title { font-family: 'Playfair Display', serif; color: #B5A8D8; font-size: 15px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #2C2050; }
.travel-group-label, .health-group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; color: #B5A8D8; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.health-group-label { color: #7EC8C8; }
.travel-trip-name { font-size: 11px; background: #2C2050; color: #B5A8D8; border-radius: 6px; padding: 2px 8px; font-weight: 500; }
.health-count-tag { font-size: 11px; background: #0D3030; color: #7EC8C8; border-radius: 6px; padding: 2px 8px; font-weight: 500; }
.contacts-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.contacts-title { font-family: 'Playfair Display', serif; font-size: 18px; color: #1C1C1E; font-weight: 700; }
.new-contact-btn { background: var(--gc); border: none; border-radius: 12px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; color: #1C1C1E; }
.contact-form { background: #fff; border-radius: 18px; padding: 18px; margin-bottom: 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.contact-form-title { font-size: 14px; font-weight: 600; color: #1C1C1E; margin-bottom: 14px; }
.contact-photo-upload { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.photo-preview, .photo-placeholder { width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--gc); }
.photo-preview { object-fit: cover; cursor: pointer; }
.photo-placeholder { background: #F5F0E8; border-style: dashed; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
.photo-label { font-size: 12px; color: #999; cursor: pointer; }
.photo-label span { color: var(--gc); font-weight: 600; text-decoration: underline; }
.contact-field { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.contact-field-label { font-size: 12px; color: #999; width: 72px; flex-shrink: 0; font-weight: 500; }
.contact-field-input, .contact-field-select { flex: 1; border: 1.5px solid #E8E0D8; border-radius: 10px; padding: 8px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: #FAFAF8; outline: none; color: #1C1C1E; }
.contact-field-input:focus, .contact-field-select:focus { border-color: var(--gc); }
.contact-form-actions { display: flex; gap: 8px; margin-top: 14px; }
.contact-save-btn { flex: 1; background: var(--gc); border: none; border-radius: 12px; padding: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; color: #1C1C1E; }
.contact-cancel-btn { padding: 10px 16px; border-radius: 12px; border: 1.5px solid #E8E0D8; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; color: #888; }
.contacts-search { width: 100%; border: 1.5px solid #E8E0D8; border-radius: 12px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: #fff; outline: none; margin-bottom: 16px; color: #1C1C1E; }
.contacts-search:focus { border-color: var(--gc); }
.contacts-section-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #C8A87E; text-transform: uppercase; margin: 14px 0 8px; }
.contact-card { background: #fff; border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); margin-bottom: 8px; }
.contact-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--gc); }
.contact-avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: #F5F0E8; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; border: 2px solid var(--gc); }
.contact-info { flex: 1; min-width: 0; }
.contact-name { font-size: 15px; font-weight: 600; color: #1C1C1E; }
.contact-company { font-size: 12px; color: #888; margin-top: 1px; }
.contact-links { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.contact-link { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #F5F0E8; color: #666; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }
.contact-delete-btn { background: none; border: none; color: #D0C8C0; cursor: pointer; font-size: 15px; padding: 4px; align-self: flex-start; }

/* FDS */
.fds-outer { display: flex; gap: 16px; align-items: flex-start; }
.fds-col { flex: 1; min-width: 0; }
.fds-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.fds-block-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: #1C1C1E; margin: 0 0 8px; text-align: center; }
.fds-block { background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 24px; }
.fds-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.fds-table th { background: #1C1C1E; color: #F5F0E8; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; padding: 8px 4px; text-align: center; }
.fds-table th:first-child { text-align: left; padding-left: 8px; }
.fds-row-green td { background: #4CAF50; color: #fff; font-weight: 600; }
.fds-row-white td { background: #fff; color: #1C1C1E; }
.fds-table td { padding: 6px 4px; text-align: center; border-bottom: 1px solid #F0EDE8; font-size: 11px; }
.fds-table td:first-child { text-align: left; padding-left: 8px; }
.fds-who-select { background: transparent; border: none; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; outline: none; max-width: 72px; }
.fds-row-green .fds-who-select { color: #fff; }
.fds-row-green .fds-who-select option { color: #1C1C1E; background: #fff; }
.fds-obs-row td { padding: 3px 8px 7px !important; background: #F9F7F4 !important; border-bottom: 2px solid #E8E0D8 !important; }
.fds-obs-inner { display: flex; flex-direction: column; gap: 4px; }
.fds-obs-input { width: 100%; border: 1.5px solid #E8E0D8; border-radius: 8px; padding: 4px 8px; font-family: 'DM Sans', sans-serif; font-size: 11px; background: #fff; outline: none; color: #555; resize: none; }
.fds-obs-input:focus { border-color: #7BBF8E; }
.fds-obs-input::placeholder { color: #BBBBB0; }
.fds-event-input { width: 100%; border: 1.5px solid #FFD0A0; border-radius: 6px; padding: 3px 7px; font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700; background: #FFF5EC; outline: none; color: #E65C00; resize: none; }
.fds-event-input:focus { border-color: #E65C00; }
.fds-event-input::placeholder { color: #FFBB88; font-weight: 400; }
.fds-event-label { font-size: 9px; color: #E65C00; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; }
.loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-size: 14px; color: #888; flex-direction: column; gap: 12px; background: #F5F0E8; }
.loading-spinner { width: 32px; height: 32px; border: 3px solid #E8E0D8; border-top-color: #E8A87C; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.task-card, .contact-card { animation: slideIn 0.2s ease; }

/* ── Date/time inline editor ── */
.date-edit-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-top:8px; padding:8px 10px; background:#F9F7F4; border-radius:10px; border:1.5px solid var(--gc); }
.date-edit-input { border:1.5px solid #E8E0D8; border-radius:8px; padding:5px 8px; font-family:'DM Sans',sans-serif; font-size:12px; background:#fff; outline:none; color:#444; }
.date-edit-input:focus { border-color:var(--gc); }
.date-edit-save { padding:5px 12px; border-radius:8px; border:none; background:var(--gc); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; color:#1C1C1E; }
.date-edit-clear { padding:5px 10px; border-radius:8px; border:1.5px solid #FFE0E0; background:#FFF5F5; font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; color:#C07070; }
.date-edit-cancel { padding:5px 10px; border-radius:8px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; color:#888; }
.add-due-btn { background:none; border:none; font-size:12px; color:#BBBBB0; cursor:pointer; margin-top:4px; padding:2px 0; display:inline-block; }
.due-tag-clickable { cursor:pointer; }
.due-tag-clickable:hover { opacity:0.75; }

/* Data de início da viagem no header */
.travel-date-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.travel-date-label { font-size:11px; color:#B5A8D8; font-weight:600; white-space:nowrap; }
.travel-date-input { background:#1C1C1E; border:1.5px solid #3D3560; border-radius:8px; padding:6px 10px; color:#F5F0E8; font-family:'DM Sans',sans-serif; font-size:12px; outline:none; flex:1; }
.travel-date-input:focus { border-color:#B5A8D8; }
.travel-trip-date { font-size:11px; color:#9B90C8; font-weight:500; margin-left:4px; }
.travel-trip-future { color:#85C1A3; }
.travel-trip-past { color:#888; }
.travel-trip-today { color:#F7D070; }

/* Edição inline do Para: na task card */
.assignee-edit-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-top:8px; padding:7px 10px; background:#F9F7F4; border-radius:10px; border:1.5px solid var(--gc); }
.assignee-edit-label { font-size:11px; color:#999; font-weight:600; white-space:nowrap; }
.assignee-edit-btn { padding:4px 10px; border-radius:16px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer; color:#666; transition:all 0.15s; }
.assignee-edit-btn.active { background:var(--gc); border-color:var(--gc); color:#1C1C1E; font-weight:700; }
.assignee-edit-save { padding:4px 12px; border-radius:16px; border:none; background:var(--gc); font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; cursor:pointer; color:#1C1C1E; }
.meta-tag-clickable { cursor:pointer; text-decoration:underline dotted; }

/* Edição inline de contato existente */
.contact-edit-form { background:#FAFAF8; border-radius:14px; padding:14px; margin-top:8px; border:1.5px solid var(--gc); }
.contact-edit-actions { display:flex; gap:8px; margin-top:10px; }
.contact-edit-save { flex:1; background:var(--gc); border:none; border-radius:10px; padding:8px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; cursor:pointer; color:#1C1C1E; }

.imovel-save-btn { flex:1; background:var(--gc); border:none; border-radius:12px; padding:10px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; color:#1C1C1E; }
.imovel-cancel-btn { padding:10px 16px; border-radius:12px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; color:#888; }

/* ── Imóveis: painel de resumo ── */
.imovel-resumo { background:linear-gradient(135deg,#2A1F10 0%,#1C1C1E 100%); border-radius:18px; padding:16px 18px; margin-bottom:18px; border:1px solid #5A3A1A; }

/* ── Imóveis: contratos ── */
.imovel-contratos { margin-top:12px; border-top:1px solid #F0EDE8; padding-top:10px; }
.imovel-contratos-title { font-size:11px; font-weight:700; letter-spacing:0.8px; color:#C8A87E; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
.add-contrato-btn { background:var(--gc); border:none; border-radius:8px; padding:3px 10px; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; cursor:pointer; color:#1C1C1E; }
.contrato-form { background:#F9F7F4; border-radius:10px; padding:10px; margin-bottom:8px; border:1.5px solid var(--gc); }
.contrato-field { display:flex; align-items:center; gap:6px; margin-bottom:7px; }

.contrato-field-input, .contrato-field-select { flex:1; border:1.5px solid #E8E0D8; border-radius:8px; padding:6px 10px; font-family:'DM Sans',sans-serif; font-size:12px; background:#fff; outline:none; color:#1C1C1E; }

.contrato-form-actions { display:flex; gap:6px; margin-top:8px; }
.contrato-save-btn { flex:1; background:var(--gc); border:none; border-radius:8px; padding:7px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; color:#1C1C1E; }
.contrato-cancel-btn { padding:7px 12px; border-radius:8px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; color:#888; }
.contrato-card { background:#F9F7F4; border-radius:10px; padding:10px 12px; margin-bottom:6px; display:flex; align-items:flex-start; gap:8px; border:1px solid #EDE8E0; }

.contrato-card-nome { font-size:13px; font-weight:600; color:#1C1C1E; }

.contrato-edit-form { background:#fff; border-radius:8px; padding:8px 10px; margin-top:6px; border:1.5px solid var(--gc); }
.contrato-del-btn { background:none; border:none; color:#D0C8C0; cursor:pointer; font-size:14px; padding:2px; flex-shrink:0; }
.contrato-edit-btn { background:none; border:none; color:#C8A87E; cursor:pointer; font-size:13px; padding:2px; }

/* ── Upload PDF contrato ── */

.contrato-pdf-btn { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:8px; border:1.5px dashed #E8E0D8; background:#FAFAF8; font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer; color:#888; transition:all 0.2s; }

/* Edição inline do texto da tarefa */
.task-text-edit { width:100%; border:1.5px solid var(--gc); border-radius:8px; padding:5px 8px; font-family:'DM Sans',sans-serif; font-size:14px; background:#FAFAF8; outline:none; color:#1C1C1E; }
.task-text-actions { display:flex; gap:6px; margin-top:4px; }
.task-text-save { padding:4px 12px; border-radius:8px; border:none; background:var(--gc); font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; cursor:pointer; color:#1C1C1E; }
.task-text-cancel { padding:4px 10px; border-radius:8px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer; color:#888; }

/* ── Edição de data do grupo de viagem ── */
.travel-trip-title { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

.travel-trip-date-save { padding:4px 12px; border-radius:8px; border:none; background:#B5A8D8; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; cursor:pointer; color:#1C1C1E; }

.travel-trip-date-cancel { padding:4px 10px; border-radius:8px; border:1.5px solid #3D3560; background:transparent; font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer; color:#888; }

/* ── Dark mode ── */
body.dark { background:#1C1C1E; }

body.dark .contrato-card, body.dark .imovel-form, body.dark .contact-form { background:#2C2C2E; color:#F5F0E8; box-shadow:0 1px 6px rgba(0,0,0,0.3); }

/* ── Busca global ── */
.global-search-bar { display:flex; align-items:center; gap:8px; padding:8px 16px 10px; background:#1C1C1E; }
.global-search-input { flex:1; background:#2C2C2E; border:1.5px solid #3C3C3E; border-radius:12px; padding:9px 14px; font-family:'DM Sans',sans-serif; font-size:14px; color:#F5F0E8; outline:none; }

.search-result-group { font-size:10px; font-weight:700; letter-spacing:1px; color:#AAA; text-transform:uppercase; padding:6px 0 2px; }
.search-icon-btn { background:none; border:none; color:#888; font-size:18px; cursor:pointer; padding:4px 8px; }

.my-filter-btn { padding:4px 12px; border-radius:16px; border:1.5px solid #3C3C3E; background:transparent; font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer; color:#888; transition:all 0.15s; }
.my-filter-btn.active { background:var(--gc); border-color:var(--gc); color:#1C1C1E; font-weight:700; }

/* ── Tags ── */
.task-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }

/* ── Endereço editável inline ── */
.address-edit-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-top:6px; padding:7px 10px; background:#F9F7F4; border-radius:10px; border:1.5px solid var(--gc); }
.address-edit-input { flex:1; border:1.5px solid #E8E0D8; border-radius:8px; padding:5px 8px; font-family:'DM Sans',sans-serif; font-size:12px; background:#fff; outline:none; color:#444; min-width:120px; }

.address-edit-cancel { padding:5px 10px; border-radius:8px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer; color:#888; }
.map-link-clickable { cursor:pointer; }

/* ── Progresso viagem ── */
.trip-progress-bar { height:4px; background:#2C2050; border-radius:2px; margin-top:6px; overflow:hidden; }
.trip-progress-fill { height:100%; background:#B5A8D8; border-radius:2px; transition:width 0.3s; }

/* ── Dashboard ── */
.dash-section { margin-bottom:20px; }

.dash-stat-lbl { font-size:10px; color:#AAA; margin-top:2px; }

.dash-trip-card { background:#fff; border-radius:12px; padding:12px 14px; margin-bottom:8px; box-shadow:0 1px 6px rgba(0,0,0,0.05); display:flex; align-items:center; gap:10px; }

.dash-trip-name { font-size:13px; font-weight:600; color:#1C1C1E; }

.dash-trip-prog { font-size:11px; color:#B5A8D8; }
.dash-filter-bar { display:flex; gap:6px; margin-bottom:14px; }
.dash-filter-btn { padding:5px 14px; border-radius:16px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; color:#666; }
.dash-filter-btn.active { background:var(--gc); border-color:var(--gc); color:#1C1C1E; font-weight:700; }
.dash-fds-card { background:#fff; border-radius:12px; padding:10px 14px; margin-bottom:6px; box-shadow:0 1px 6px rgba(0,0,0,0.05); display:flex; justify-content:space-between; align-items:center; }
.dash-fds-dates { font-size:12px; color:#1C1C1E; font-weight:500; }

.dash-task-text { flex:1; font-size:12px; color:#1C1C1E; }
.dash-task-group { font-size:10px; background:#F5F0E8; border-radius:5px; padding:1px 6px; color:#888; }

/* ── Mercado ── */

.mercado-add-btn { width:44px; height:44px; border-radius:13px; border:none; background:#8FBC8F; color:#1C1C1E; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.mercado-cat-section { margin-bottom:20px; }

<script type="module">

// ── FIREBASE CONFIG ────────────────────────────────────────────────
const firebaseConfig = {

// ── CONSTANTS ──────────────────────────────────────────────────────
const GROUPS = [

  { id: "viagens",     label: "Viagens",     emoji: "✈️", color: "#B5A8D8" },

  { id: "outros",      label: "Outros",      emoji: "🎯", color: "#A8B8D8" },
];
const HOUSES = [
  { id: "itaim",     label: "Itaim",     emoji: "🏙" },
  { id: "itanhaem",  label: "Itanhaém",  emoji: "🏖" },
  { id: "jacuma",    label: "Jacumã",    emoji: "🌴" },
];
const HEALTH_CATS   = ["Remédio","Exame","Médico","Dentista","Outros"];
const HEALTH_EMOJIS = {"Remédio":"💊","Exame":"🔬","Médico":"👨‍⚕️","Dentista":"🦷","Outros":"🏥"};

const SHOPPING_EMOJIS = {"Mercado":"🛒","Roupa":"👕","Comemoração":"🎉","Remédio":"💊","Suplemento":"💪","Outros":"📦"};
const ASSIGNEES     = ["Daniel","Natalia","Casal","Joaquim","Isabelle","Família"];
const MERCADO_CASAS = ["Itaim","Itanhaém","Jacumã"];
const MERCADO_CASA_EMOJIS = {"Itaim":"🏙","Itanhaém":"🏖","Jacumã":"🌴"};
const MERCADO_CATS = ["Higiene","Limpeza","Hortifruti","Proteínas","Crianças","Laticínios","Padaria","Congelados","Outros"];
const MERCADO_CAT_EMOJIS = {"Higiene":"🧼","Limpeza":"🧹","Hortifruti":"🥦","Proteínas":"🥩","Crianças":"👶","Laticínios":"🧀","Padaria":"🍞","Congelados":"❄️","Outros":"📦"};
// Mapeamento de palavras-chave para categoria automática
const MERCADO_KEYWORDS = {
  "Higiene":   ["sabonete","shampoo","condicionador","creme","escova","pasta","dental","desodorante","absorvente","fralda","cotonete","algodão","lenço","perfume","talco"],
  "Limpeza":   ["detergente","sabão","amaciante","desinfetante","água sanitária","pano","esponja","rodo","vassoura","limpeza","multiuso","omo","ariel","veja","flash"],
  "Hortifruti":["alface","tomate","cebola","alho","cenoura","beterraba","pepino","limão","laranja","banana","maçã","uva","abacaxi","manga","melão","morango","rúcula","espinafre","brócolis","batata","inhame","abobrinha","chuchu","pimentão","milho","ervilha","vagem"],
  "Proteínas": ["frango","carne","peixe","atum","sardinha","camarão","linguiça","presunto","salame","bacon","ovo","feijão","lentilha","grão","chia","quinoa","proteína"],
  "Crianças":  ["fralda","mamadeira","papinha","neston","danone","yakult","danoninho","sucrilhos","cereal","biscoito","bolinha","kinder","leite ninho","mucilon"],
  "Laticínios":["leite","queijo","iogurte","manteiga","margarina","creme de leite","requeijão","mussarela","parmesão","ricota","nata","chantilly"],
  "Padaria":   ["pão","bolo","bisnaga","torrada","croissant","baguete","farinha","fermento","trigo","tapioca","granola","aveia"],
  "Congelados":["sorvete","pizza congelada","lasanha","hambúrguer","nugget","batata frita","salmão congelado","empanado","ravioli","panqueca"],
};
function inferMercadoCat(nome) {
  const lower = (nome||"").toLowerCase();
  for (const [cat, keys] of Object.entries(MERCADO_KEYWORDS)) {
    if (keys.some(k => lower.includes(k))) return cat;
  }
  return "Outros";
}

const RENOVAR_TIPOS = ["Seguro","Documento","Benefício Funcionário","Pagamento","Assinatura","Licença","Outro"];
const RENOVAR_TIPO_EMOJIS = {"Seguro":"🛡️","Documento":"📄","Benefício Funcionário":"👷","Pagamento":"💰","Assinatura":"📋","Licença":"🔑","Outro":"🔄"};
const RENOVAR_RECORRENCIA = ["Anual","Semestral","Trimestral","Mensal","Único"];
const RENOVAR_STATUS = ["Em dia","Vencendo em breve","Vencido","Cancelado"];

const IMOVEL_TIPOS   = ["Casa","Apartamento","Lote","Comercial","Loja","Outros"];
const IMOVEL_STATUS  = ["Próprio","Locado","Em construção","À venda","Vendido"];
const IMOVEL_GRUPOS  = ["Casa","Apartamento","Lote","Comercial","Loja","Outros"];
const IMOVEL_GRUPO_EMOJIS = {"Casa":"🏠","Apartamento":"🏢","Lote":"🌿","Comercial":"🏪","Loja":"🏬","Outros":"🏘"};

// ── STATE ──────────────────────────────────────────────────────────
let state = {
  activeGroup: "dashboard", tasks: [], contacts: [],
  assignee: "Daniel",
  dueDate: "", dueTime: "", addToCalendar: false,
  travelName: "", travelDate: "", travelCategory: "Documentos",
  editingTripDate: {},  // tripName -> bool
  shoppingCategory: "Mercado",
  healthCategory: "Médico", healthMedico: "", healthRetorno: "", selectedHouse: null,
  showContactForm: false, contactSearch: "", editingContactId: null,
  cf: { photo:null, name:"", company:"", section:"Outros", city:"", phone:"", site:"", email:"" },
  editingNotes: {}, notesVal: {}, editingAssignee: {}, editingText: {}, textVal: {}, editingAddress: {}, addressVal: {},
  newTags: [],
  _pdfTemp: {}, _snap_main: "", _snap_address: "", _snap_notes: "",
  editingDateTime: {},  // tracks which task has date/time editor open
  _dtEdit: {},           // temp date/time values while editing
  syncStatus: "syncing",
  imoveis: [], editingImovelId: null, showImovelForm: false,
  showContratoForm: {},   // imovelId -> bool
  editingContratoId: {},  // imovelId -> contratoId
  _contratoSnap: {},      // temp contrato fields while editing

  fds: {},
  hidePast: true,
  // Mercado
  mercadoCasa: "Itaim", mercadoSearch: "",
  // Renovar
  renovar: [], showRenovarForm: false, editingRenovarId: null,
  // Dashboard
  dashFilter: "Daniel",
  // Global
  globalSearch: "", showGlobalSearch: false, darkMode: false, myFilter: "Todos",
};

// ── FIREBASE SYNC ──────────────────────────────────────────────────
// Listen for real-time updates
onValue(ref(db, "tasks"), snap => {
  const data = snap.val();
  state.tasks = data ? Object.values(data).sort((a,b) => b.id - a.id) : [];
  state.syncStatus = "online";
  safeRender();
}, err => { state.syncStatus = "offline"; safeRender(); });

onValue(ref(db, "contacts"), snap => {
  const data = snap.val();
  state.contacts = data ? Object.values(data).sort((a,b) => b.id - a.id) : [];
  safeRender();
});

onValue(ref(db, "imoveis"), snap => {
  const data = snap.val();
  state.imoveis = data ? Object.values(data).sort((a,b)=> (a.nome||"").localeCompare(b.nome||"")) : [];
  safeRender();
});

async function fbSaveImovel(im) {
  setSyncStatus("syncing");
  try { await set(ref(db, `imoveis/${im.id}`), im); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbSaveImovel:", e); }
}
async function fbDeleteImovel(id) {
  setSyncStatus("syncing");
  try { await remove(ref(db, `imoveis/${id}`)); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbDeleteImovel:", e); }
}

onValue(ref(db, "renovar"), snap => {
  const data = snap.val();
  state.renovar = data ? Object.values(data).sort((a,b)=> (a.vencimento||"9").localeCompare(b.vencimento||"9")) : [];
  safeRender();
});
async function fbSaveRenovar(item) {
  setSyncStatus("syncing");
  try { await set(ref(db, `renovar/${item.id}`), item); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error(e); }
}
async function fbDeleteRenovar(id) {
  setSyncStatus("syncing");
  try { await remove(ref(db, `renovar/${id}`)); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error(e); }
}

onValue(ref(db, "fds"), snap => {
  state.fds = snap.val() || {};
  const active = document.activeElement;
  if (active && active.classList.contains("fds-event-input")) return;
  render();
});

async function fbSaveFds(weekKey, data) {
  try { await set(ref(db, `fds/${weekKey}`), data); }
  catch(e) { console.error("fbSaveFds:", e); setSyncStatus("offline"); }
}

async function fbSaveTask(task) {
  setSyncStatus("syncing");
  try { await set(ref(db, `tasks/${task.id}`), task); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbSaveTask:", e); }
}
async function fbDeleteTask(id) {
  setSyncStatus("syncing");
  try { await remove(ref(db, `tasks/${id}`)); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbDeleteTask:", e); }
}
async function fbUpdateTask(id, fields) {
  setSyncStatus("syncing");
  try { await update(ref(db, `tasks/${id}`), fields); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbUpdateTask:", e); }
}
async function fbSaveContact(contact) {
  setSyncStatus("syncing");
  try { await set(ref(db, `contacts/${contact.id}`), contact); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbSaveContact:", e); }
}
async function fbDeleteContact(id) {
  setSyncStatus("syncing");
  try { await remove(ref(db, `contacts/${id}`)); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbDeleteContact:", e); }
}

function setSyncStatus(s) {
  state.syncStatus = s;
  const el = document.getElementById("sync-badge");
  if (!el) return;
  if (s === "syncing") { el.textContent = "⏳ Sincronizando..."; el.className = "sync-badge syncing"; }
  else if (s === "online") { el.textContent = "🟢 Sincronizado"; el.className = "sync-badge"; }
  else { el.textContent = "🔴 Offline"; el.className = "sync-badge offline"; }
}

// ── RENDER ──────────────────────────────────────────────────────────
// safeRender: used by Firebase listeners — won't re-render if user is typing in a text input
function safeRender() {
  const active = document.activeElement;
  const inputTags = ["INPUT","TEXTAREA","SELECT"];
  const typingInputIds = ["main-input","travel-name-input","address-input","notes-input","contacts-search"];
  const inTripDateEdit = active && active.classList?.contains("travel-trip-date-input");
  // Também protege qualquer input/textarea ativo em formulários de imóvel e contrato
  const inImovelForm = active && (active.closest?.('.imovel-inline-form') || active.closest?.('.imovel-form') || active.closest?.('.contrato-form') || active.closest?.('.contrato-edit-form') || active.closest?.('.contact-edit-form') || active.closest?.('.contact-form'));
  if (active && inputTags.includes(active.tagName) && (typingInputIds.includes(active.id) || active.classList.contains("fds-event-input") || (active.type==="date"||active.type==="time") || inImovelForm || inTripDateEdit)) {
    // Update sync badge without full re-render
    setSyncStatus(state.syncStatus);
    return;
  }
  render();
}

function render() {
  const g = GROUPS.find(g => g.id === state.activeGroup);
  if (!g) return;
  document.documentElement.style.setProperty("--gc", g.color);
  const appEl = document.getElementById("app");
  if (appEl) appEl.innerHTML = buildApp();
  // Rolar navbar para mostrar o tab ativo (importante no celular)
  requestAnimationFrame(() => {
    const activeTab = document.querySelector('.group-tab.active');
    if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  });
}

function buildApp() {
  const groupTasks = state.tasks.filter(t => t.group === state.activeGroup);
  const pending = groupTasks.filter(t => !t.done);
  const done    = groupTasks.filter(t =>  t.done);
  const syncLabel = state.syncStatus === "syncing" ? "⏳ Sincronizando..."
    : state.syncStatus === "offline" ? "🔴 Offline" : "🟢 Sincronizado";
  const syncClass = state.syncStatus === "syncing" ? "sync-badge syncing"
    : state.syncStatus === "offline" ? "sync-badge offline" : "sync-badge";

  // Aplicar dark mode
  if (state.darkMode) document.body.classList.add('dark');
  else document.body.classList.remove('dark');

  // Busca global ativa?
  const searchBar = state.showGlobalSearch ? `
    <div class="global-search-bar">
      <input id="global-search-input" class="global-search-input" placeholder="🔍 Buscar em tudo..." value="${esc(state.globalSearch)}" oninput="S('globalSearch',this.value)">
      <button class="global-search-close" onclick="S('showGlobalSearch',false);S('globalSearch','')">✕</button>
    </div>` : "";

  // Filtro "Meu" — mostrado em grupos de tarefas
  const TASK_GROUPS = ["casa","compras","dejulie","viladejulie","saude","viagens","outros","mercado"];
  const showMyFilter = TASK_GROUPS.includes(state.activeGroup);
  const myFilterBar = showMyFilter ? `<div class="my-filter-bar">
    <span style="font-size:11px;color:#888;font-weight:500">Ver:</span>
    ${["Todos","Daniel","Natalia","Casal","Família"].map(f =>
      `<button class="my-filter-btn${state.myFilter===f?" active":""}" onclick="S('myFilter','${f}')">${f}</button>`
    ).join("")}
  </div>` : "";

  // Roteamento da tela ativa
  const mainContent = state.showGlobalSearch && state.globalSearch
    ? buildGlobalSearch()
    : state.activeGroup === "dashboard" ? (typeof buildDashboard === 'function' ? buildDashboard() : '<div class="empty"><div class="empty-icon">📊</div><div>Dashboard carregando...</div></div>')
    : state.activeGroup === "contatos"  ? buildContacts()
    : state.activeGroup === "imoveis"   ? buildImoveis()
    : state.activeGroup === "fds"       ? buildFDS()
    : state.activeGroup === "mercado"   ? (typeof buildMercado === 'function' ? buildMercado() : '')
    : state.activeGroup === "renovar"   ? (typeof buildRenovar === 'function' ? buildRenovar() : '')
    : buildTasksSection(pending, done, groupTasks);

  return `
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Concierge<br>Familiar</div>
        <div class="header-sub">Daniel &amp; Natalia</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="search-icon-btn" onclick="S('showGlobalSearch',!state.showGlobalSearch)" title="Busca global">🔍</button>
        <button class="dark-toggle" onclick="S('darkMode',!state.darkMode)">${state.darkMode?"☀️":"🌙"}</button>
        <div id="sync-badge" class="${syncClass}">${syncLabel}</div>
      </div>
    </div>
    ${searchBar}
    <div class="groups-nav">
      ${GROUPS.map(g => `<button class="group-tab${g.id===state.activeGroup?" active":""}"
        style="${g.id===state.activeGroup?`background:${g.color}`:""}"
        onclick="setGroup('${g.id}')">${g.emoji} ${g.label}</button>`).join("")}
    </div>
    ${myFilterBar}
  </div>
  <div class="content">
    ${mainContent}
  </div>`;
}

function buildTasksSection(pending, done, groupTasks) {
  // Aplicar filtro "Meu"
  const mf = state.myFilter || "Todos";
  if (mf !== "Todos") {
    pending = pending.filter(t => t.assignee === mf || t.assignee === "Casal" || t.assignee === "Família");
    done    = done.filter(t =>    t.assignee === mf || t.assignee === "Casal" || t.assignee === "Família");
    groupTasks = [...pending, ...done];
  }
  const pct = groupTasks.length > 0 ? Math.round((done.length/groupTasks.length)*100) : 0;
  return `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${pending.length}</div><div class="stat-lbl">Pendentes</div></div>
      <div class="stat-card"><div class="stat-num">${done.length}</div><div class="stat-lbl">Concluídas</div></div>
      <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-lbl">Progresso</div></div>
    </div>
    ${buildGroupHeader()}
    ${buildHouseSelector()}
    ${buildAddForm()}
    ${buildTaskLists(pending, done, groupTasks)}`;
}

function buildTaskLists(pending, done, groupTasks) {
  if (state.activeGroup==="viagens") return buildTravelList(pending, done);
  if (state.activeGroup==="saude")   return buildHealthList(pending, done);
  if (state.activeGroup==="compras") return buildShoppingList(pending, done);
  let html = "";
  if (pending.length) html += `<div class="section-label">A FAZER</div><div class="task-list">${pending.map(buildTaskCard).join("")}</div>`;
  if (done.length)    html += `<div class="section-label">CONCLUÍDAS</div><div class="task-list">${done.map(buildTaskCard).join("")}</div>`;
  if (!groupTasks.length) html += `<div class="empty"><div class="empty-icon">${GROUPS.find(g=>g.id===state.activeGroup)?.emoji}</div><div>Nenhuma tarefa ainda.</div></div>`;
  return html;
}

function buildTravelList(pending, done) {
  const today = new Date().toISOString().split("T")[0];
  // Agrupar por viagem, guardando a data de início de cada grupo
  const trips = {};
  [...pending,...done].forEach(t => {
    const trip = t.travelName||"Próxima viagem";
    const cat  = t.travelCategory||"Outros";
    if (!trips[trip]) trips[trip] = { date: t.travelDate||null, cats: {} };
    // Se alguma tarefa da viagem tem data, usa a menor encontrada
    if (t.travelDate && (!trips[trip].date || t.travelDate < trips[trip].date))
      trips[trip].date = t.travelDate;
    if (!trips[trip].cats[cat]) trips[trip].cats[cat] = [];
    trips[trip].cats[cat].push(t);
  });
  if (!Object.keys(trips).length)
    return '<div class="empty"><div class="empty-icon">✈️</div><div>Nenhuma tarefa de viagem.</div></div>';

  // Ordenar viagens: com data em ordem crescente, sem data no final
  const sorted = Object.entries(trips).sort(([,a],[,b]) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date < b.date ? -1 : a.date > b.date ? 1 : 0;
  });

  return sorted.map(([trip, info]) => {
    const d = info.date;
    let dateLabel = "", dateClass = "";
    if (d) {
      const fmt = new Date(d+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"});
      if (d < today) { dateLabel = fmt + " · passada"; dateClass = "travel-trip-past"; }
      else if (d === today) { dateLabel = "Hoje · " + fmt; dateClass = "travel-trip-today"; }
      else { dateLabel = fmt; dateClass = "travel-trip-future"; }
    }
    const isEditingDate = !!state.editingTripDate[trip];
    const tripKey = trip;  // usar nome direto — safeAttrStr cuida do escape nos onclicks
    // Header do grupo com data editável
    const tripHeader = '<div class="travel-trip-title">'
      + '✈️ ' + esc(trip) + ' '
      + (isEditingDate
          ? ''
          : (dateLabel
              ? '<span class="travel-trip-date ' + dateClass + '" onclick="startEditTripDate(' + safeAttrStr(tripKey) + ')" title="Clique para editar data" style="cursor:pointer">· ' + dateLabel + ' ✏️</span>'
              : '<button class="travel-trip-date-edit-btn" onclick="startEditTripDate(' + safeAttrStr(tripKey) + ')">📅 + Data de início</button>'
            )
        )
      + '</div>'
        + (isEditingDate
          ? '<div class="travel-trip-date-row">'
            + '<label>📅 Início:</label>'
            + '<input id="ttd-' + encodeURIComponent(tripKey) + '" type="date" class="travel-trip-date-input" value="' + (d||'') + '">'
            + '<button class="travel-trip-date-save" onclick="saveTripDate(' + safeAttrStr(tripKey) + ',' + safeAttrStr(tripKey) + ')">✓ Salvar</button>'
            + (d ? '<button class="travel-trip-date-clear" onclick="clearTripDate(' + safeAttrStr(tripKey) + ',' + safeAttrStr(tripKey) + ')">✕ Remover</button>' : '')
            + '<button class="travel-trip-date-cancel" onclick="cancelTripDate(' + safeAttrStr(tripKey) + ')">Cancelar</button>'
            + '</div>'
          : ''
        );

    const allT = Object.values(info.cats).flat();
    const doneT = allT.filter(t=>t.done).length;
    const pctT = allT.length ? Math.round(doneT/allT.length*100) : 0;
    const progressBar = allT.length ? `<div class="trip-progress-bar"><div class="trip-progress-fill" style="width:${pctT}%"></div></div><div class="trip-progress-lbl">${doneT}/${allT.length} tarefas · ${pctT}% concluído</div>` : "";

    return '<div class="travel-group-section">'
      + tripHeader
      + progressBar
      + Object.entries(info.cats).map(([cat, tasks]) =>
          '<div style="margin-bottom:16px">'
          + '<div class="travel-group-label">' + esc(cat)
          + ' <span class="travel-trip-name">' + tasks.filter(t=>t.done).length + '/' + tasks.length + '</span>'
          + '</div>'
          + '<div class="task-list">' + tasks.map(buildTaskCard).join("") + '</div>'
          + '</div>'
        ).join("")
      + '</div>';
  }).join("");
}

function buildShoppingList(pending, done) {
  const cats = {};
  [...pending,...done].forEach(t => {
    const cat = t.shoppingCategory||"Outros";
    if (!cats[cat]) cats[cat]=[];
    cats[cat].push(t);
  });
  const sorted = [...SHOPPING_CATS.filter(c=>cats[c]),...Object.keys(cats).filter(c=>!SHOPPING_CATS.includes(c))];
  if (!sorted.length) return '<div class="empty"><div class="empty-icon">🛒</div><div>Nenhum item de compras.</div></div>';
  return sorted.map(cat =>
    '<div style="margin-bottom:20px">'
    + '<div class="health-group-label" style="color:#85C1A3">'
    + (SHOPPING_EMOJIS[cat]||"📦") + ' ' + esc(cat)
    + ' <span class="health-count-tag" style="background:#E8F5EF;color:#3A9060">'
    + cats[cat].filter(t=>t.done).length + '/' + cats[cat].length
    + '</span></div>'
    + '<div class="task-list">' + cats[cat].map(buildTaskCard).join("") + '</div>'
    + '</div>'
  ).join("");
}

function buildHealthList(pending, done) {
  const cats = {};
  [...pending,...done].forEach(t => {
    const cat = t.healthCategory||"Outros";
    if (!cats[cat]) cats[cat]=[];
    cats[cat].push(t);
  });
  const sorted = [...HEALTH_CATS.filter(c=>cats[c]),...Object.keys(cats).filter(c=>!HEALTH_CATS.includes(c))];
  if (!sorted.length) return `<div class="empty"><div class="empty-icon">🏥</div><div>Nenhuma tarefa de saúde.</div></div>`;
  return sorted.map(cat=>`
    <div style="margin-bottom:20px">
      <div class="health-group-label">${HEALTH_EMOJIS[cat]||"🏥"} ${cat}
        <span class="health-count-tag">${cats[cat].filter(t=>t.done).length}/${cats[cat].length}</span>
      </div>
      <div class="task-list">${cats[cat].map(buildTaskCard).join("")}</div>
    </div>`).join("");
}

function buildTaskCard(task) {
  const today = new Date().toISOString().split("T")[0];
  const overdue = task.dueDate && !task.done && task.dueDate < today;
  let dueFmt = task.dueDate
    ? new Date(task.dueDate+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"})
      + (task.dueTime?` às ${task.dueTime}`:"")
    : "";
  const h = task.house ? HOUSES.find(h=>h.id===task.house) : null;
  const mapsUrl = task.address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(task.address)}` : null;
  const isEditingNote = state.editingNotes[task.id];
  const isEditingDate = state.editingDateTime[task.id];
  const notesVal = state.notesVal[task.id]!==undefined ? state.notesVal[task.id] : (task.notes||"");

  // Date/time editor block — built with string concat to avoid template literal quote conflicts
  const tid = task.id;
  const dateEditorHtml = isEditingDate
    ? '<div class="date-edit-row">'
      + '<input id="de-date-' + tid + '" type="date" class="date-edit-input" value="' + (task.dueDate||'') + '"'
      + ' onchange="onTaskDateChange(' + tid + ',this.value)">'
      + '<input id="de-time-' + tid + '" type="time" class="date-edit-input" value="' + (task.dueTime||'') + '"'
      + (!task.dueDate ? ' disabled' : '') + ' onchange="state._dtEdit[' + tid + '].time=this.value">'
      + '<button class="date-edit-save" onclick="saveDateEdit(' + tid + ')">✓ Salvar</button>'
      + '<button class="date-edit-clear" onclick="clearDateEdit(' + tid + ')">🗑 Remover</button>'
      + '<button class="date-edit-cancel" onclick="cancelDateEdit(' + tid + ')">Cancelar</button>'
      + '</div>'
    : "";

  // Due tag — clickable when task is pending
  const dueClass = "due-tag" + (task.done ? " done-tag" : overdue ? " overdue" : "") + (task.done ? "" : " due-tag-clickable");
  const dueClick = task.done ? "" : ' onclick="startEditDate(' + tid + ')" title="Toque para editar data"';
  const duePrefix = task.done ? "✓ " : overdue ? "⚠ " : "📅 ";
  const dueDateHtml = dueFmt
    ? '<span class="' + dueClass + '"' + dueClick + '>' + duePrefix + esc(dueFmt) + '</span>'
    : "";

  return `<div class="task-card${task.done?" done":""}">
    <div class="task-row">
      <button class="check-btn${task.done?" done":""}" onclick="toggleTask(${task.id})">${task.done?"✓":""}</button>
      <div class="task-body">
        ${state.editingText[task.id] ? (
          '<input class="task-text-edit" id="te-' + task.id + '" value="' + esc(state.textVal[task.id]||task.text) + '" oninput="state.textVal[' + task.id + ']=this.value">'
          + '<div class="task-text-actions">'
          + '<button class="task-text-save" onclick="saveTaskText(' + task.id + ')">✓ Salvar</button>'
          + '<button class="task-text-cancel" onclick="cancelTaskText(' + task.id + ')">Cancelar</button>'
          + '</div>'
        ) : (
          '<div class="task-text' + (task.done?" done":"") + '" onclick="' + (task.done?"":"startEditText("+task.id+")") + '" title="' + (task.done?"":"Toque para editar") + '">' + esc(task.text) + '</div>'
        )}
        <div class="task-meta">
          <span class="meta-tag meta-tag-clickable" onclick="startEditAssignee(${task.id})" title="Toque para editar">👤 ${task.assignee}</span>
          ${h?`<span class="house-tag">${h.emoji} ${h.label}</span>`:""}
          ${task.healthMedico?`<span class="meta-tag">👨‍⚕️ ${esc(task.healthMedico)}</span>`:""}
          ${task.healthRetorno?`<span class="due-tag">🗓 Retorno: ${new Date(task.healthRetorno+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}</span>`:""}
          ${dueDateHtml}
          <span>${task.createdAt}</span>
        </div>
      </div>
      <button class="delete-btn" onclick="deleteTask(${task.id})">✕</button>
    </div>
    ${dateEditorHtml}
    ${state.editingAssignee[task.id] ? (() => {
      const cur = state.editingAssignee[task.id];
      return '<div class="assignee-edit-row">'
        + '<span class="assignee-edit-label">Para:</span>'
        + ASSIGNEES.map(a => '<button class="assignee-edit-btn' + (a===cur?' active':'') + '" onclick="pickAssignee(' + task.id + ',' + safeAttrStr(a) + ')">' + a + '</button>').join('')
        + '<button class="assignee-edit-save" onclick="saveAssignee(' + task.id + ')">✓</button>'
        + '<button class="date-edit-cancel" onclick="cancelAssigneeEdit(' + task.id + ')">✕</button>'
        + '</div>';
    })() : ""}
    ${!task.dueDate && !isEditingDate && !task.done ? `<button class="add-due-btn" onclick="startEditDate(${task.id})">📅 Adicionar prazo</button>` : ""}
    ${(() => {
      const isEditAddr = !!state.editingAddress[task.id];
      const addrVal = state.addressVal[task.id] !== undefined ? state.addressVal[task.id] : (task.address||"");
      if (isEditAddr) return '<div class="address-edit-row">'
        + '<input id="ae-' + task.id + '" class="address-edit-input" value="' + esc(addrVal) + '" placeholder="Endereço..." oninput="state.addressVal[' + task.id + ']=this.value">'
        + '<button class="address-edit-save" onclick="saveAddress(' + task.id + ')">✓</button>'
        + '<button class="address-edit-cancel" onclick="cancelAddress(' + task.id + ')">✕</button>'
        + '</div>';
      if (mapsUrl) return '<div class="task-address"><a href="' + mapsUrl + '" target="_blank" class="map-link map-link-clickable" title="Toque para ver no Maps">📍 ' + esc(task.address) + '</a>'
        + '<button onclick="startEditAddress(' + task.id + ')" style="background:none;border:none;color:#C8A87E;cursor:pointer;font-size:11px;padding:0 4px">✏️</button></div>';
      return '<button class="add-note-btn" onclick="startEditAddress(' + task.id + ')" style="color:#BBBBB0;font-size:11px;margin-top:2px">📍 Adicionar endereço</button>';
    })()}
    ${task.tags && task.tags.length ? `<div class="task-tags">${task.tags.map(tag => `<span class="task-tag task-tag-${tag}" onclick="removeTag(${task.id},'${tag}')" title="Clique para remover">🏷️ ${tag}</span>`).join("")}</div>` : ""}
    <div style="margin-top:6px">
      ${isEditingNote?`
        <textarea class="notes-edit-input" oninput="setNoteVal(${task.id},this.value)"
          placeholder="Escreva observações...">${esc(notesVal)}</textarea>
        <div class="note-actions">
          <button class="note-save" onclick="saveNote(${task.id})">Salvar</button>
          <button class="note-cancel" onclick="cancelNote(${task.id})">Cancelar</button>
        </div>`:
      task.notes?`
        <div class="task-notes" onclick="startEditNote(${task.id})">
          <span class="task-notes-label">💬 Observações (toque para editar)</span>
          ${esc(task.notes)}
        </div>`:
      `<button class="add-note-btn" onclick="startEditNote(${task.id})">+ Adicionar observação</button>`}
    </div>
  </div>`;
}

// ── BUSCA GLOBAL ────────────────────────────────────────────────────
function buildGlobalSearch() {
  const q = (state.globalSearch||"").toLowerCase().trim();
  if (!q) return `<div class="empty"><div class="empty-icon">🔍</div><div>Digite para buscar em todos os grupos...</div></div>`;

  const GNAMES = {"casa":"Casa","compras":"Compras","dejulie":"Dejulie","viladejulie":"Vila Dejulie",
    "saude":"Saúde","viagens":"Viagens","outros":"Outros","mercado":"Mercado"};
  const GEMOJIS = {"casa":"🏠","compras":"🛒","dejulie":"💛","viladejulie":"🏡",
    "saude":"🏥","viagens":"✈️","outros":"🎯","mercado":"🧺"};

  // Tarefas
  const tasks = state.tasks.filter(t =>
    (t.text||"").toLowerCase().includes(q) ||
    (t.notes||"").toLowerCase().includes(q) ||
    (t.address||"").toLowerCase().includes(q)
  );
  // Contatos
  const contacts = state.contacts.filter(c =>
    (c.name||"").toLowerCase().includes(q) ||
    (c.company||"").toLowerCase().includes(q) ||
    (c.phone||"").toLowerCase().includes(q)
  );
  // Imóveis
  const imoveis = state.imoveis.filter(im =>
    (im.nome||"").toLowerCase().includes(q) ||
    (im.cidade||"").toLowerCase().includes(q) ||
    (im.empreendimento||"").toLowerCase().includes(q)
  );
  // Renovar
  const renovar = state.renovar.filter(r =>
    (r.nome||"").toLowerCase().includes(q) ||
    (r.notas||"").toLowerCase().includes(q)
  );

  const total = tasks.length + contacts.length + imoveis.length + renovar.length;
  if (!total) return `<div class="empty"><div class="empty-icon">🔍</div><div>Nenhum resultado para "<strong>${esc(q)}</strong>"</div></div>`;

  let html = `<div style="font-size:12px;color:#888;margin-bottom:12px">${total} resultado(s) para "<strong>${esc(q)}</strong>"</div>`;

  if (tasks.length) {
    html += `<div class="search-result-group">📋 Tarefas (${tasks.length})</div>`;
    html += tasks.slice(0,8).map(t =>
      `<div class="dash-task-row" style="cursor:pointer" onclick="setGroup('${t.group}')">
        <span class="dash-task-group">${GEMOJIS[t.group]||"📌"} ${GNAMES[t.group]||t.group}</span>
        <span class="dash-task-text">${esc(t.text)}</span>
        ${t.done?'<span style="font-size:10px;color:#7BBF7B">✓</span>':''}
      </div>`
    ).join("") + (tasks.length > 8 ? `<div style="font-size:11px;color:#AAA;padding:4px 0">+${tasks.length-8} tarefas...</div>` : "");
  }

  if (contacts.length) {
    html += `<div class="search-result-group" style="margin-top:12px">👥 Contatos (${contacts.length})</div>`;
    html += contacts.slice(0,4).map(c =>
      `<div class="dash-task-row" style="cursor:pointer" onclick="setGroup('contatos')">
        <span class="dash-task-text"><strong>${esc(c.name)}</strong>${c.company?` · ${esc(c.company)}`:""}</span>
        ${c.phone?`<span class="dash-task-group">📱</span>`:""}
      </div>`
    ).join("");
  }

  if (imoveis.length) {
    html += `<div class="search-result-group" style="margin-top:12px">🏘 Imóveis (${imoveis.length})</div>`;
    html += imoveis.map(im =>
      `<div class="dash-task-row" style="cursor:pointer" onclick="setGroup('imoveis')">
        <span class="dash-task-text"><strong>${esc(im.nome)}</strong>${im.cidade?` · ${esc(im.cidade)}`:""}</span>
        <span class="dash-task-group">${esc(im.tipo||"")}</span>
      </div>`
    ).join("");
  }

  if (renovar.length) {
    html += `<div class="search-result-group" style="margin-top:12px">🔄 Renovar (${renovar.length})</div>`;
    html += renovar.map(r =>
      `<div class="dash-task-row" style="cursor:pointer" onclick="setGroup('renovar')">
        <span class="dash-task-text"><strong>${esc(r.nome)}</strong></span>
        <span class="dash-task-group">${RENOVAR_TIPO_EMOJIS[r.tipo]||"🔄"}</span>
      </div>`
    ).join("");
  }

  return html;
}

// ── RENOVAR ────────────────────────────────────────────────────────
function renovarStatus(item) {
  if (!item.vencimento) return "neutro";
  const today = new Date().toISOString().split("T")[0];
  if (item.vencimento < today) return "vencido";
  const diff = (new Date(item.vencimento) - new Date()) / 86400000;
  if (diff <= 30) return "warn";
  return "ok";
}

function buildRenovarForm(item, prefix) {
  const v = f => esc(item[f]||"");
  const field = (lbl, id, ph, type) =>
    `<div class="renovar-field"><span class="renovar-field-lbl">${lbl}</span><input id="${prefix}-${id}" class="renovar-field-input" type="${type||'text'}" placeholder="${ph}" value="${v(id)}"></div>`;
  const sel = (lbl, id, opts) =>
    `<div class="renovar-field"><span class="renovar-field-lbl">${lbl}</span><select id="${prefix}-${id}" class="renovar-field-select">${opts.map(o=>`<option value="${o}"${o===(item[id]||opts[0])?" selected":""}>${o}</option>`).join("")}</select></div>`;
  return `<div>${field("📝 Nome","nome","Ex: Seguro DPVAT carro")}
    ${field("👤 Responsável","responsavel","Daniel, Natalia...")}
    ${sel("📐 Tipo","tipo",RENOVAR_TIPOS)}
    ${sel("🔁 Recorrência","recorrencia",RENOVAR_RECORRENCIA)}
    ${sel("🔖 Status","status",RENOVAR_STATUS)}
    ${field("📅 Vencimento","vencimento","","date")}
    ${field("💬 Notas","notas","Detalhes, valor, contato...")}
  </div>`;
}

function readRenovarForm(prefix) {
  const g = id => { const el=document.getElementById(prefix+"-"+id); return el?el.value.trim():""; };
  return { nome:g("nome"), responsavel:g("responsavel"), tipo:g("tipo"), recorrencia:g("recorrencia"), status:g("status"), vencimento:g("vencimento"), notas:g("notas") };
}

function buildRenovar() {
  const today = new Date().toISOString().split("T")[0];
  const ok    = state.renovar.filter(r => renovarStatus(r) === "ok").length;
  const warn  = state.renovar.filter(r => renovarStatus(r) === "warn").length;
  const venc  = state.renovar.filter(r => renovarStatus(r) === "vencido").length;

  const headerHtml = `<div class="renovar-header">
    <div class="renovar-header-title">🔄 Controle de Renovações</div>
    <div class="renovar-stats-mini">
      <span class="renovar-stat-mini renovar-stat-ok">✓ Em dia: ${ok}</span>
      <span class="renovar-stat-mini renovar-stat-warn">⚠ Vencendo: ${warn}</span>
      <span class="renovar-stat-mini renovar-stat-vencido">✕ Vencido: ${venc}</span>
    </div>
  </div>`;

  const formHtml = state.showRenovarForm ? `<div class="renovar-form">
    <div style="font-size:14px;font-weight:700;color:#1C1C1E;margin-bottom:12px">🔄 Novo Item</div>
    ${buildRenovarForm({}, "rn")}
    <div class="renovar-edit-actions">
      <button class="renovar-save-btn" onclick="saveNewRenovar()">Salvar</button>
      <button class="renovar-cancel-btn" onclick="S('showRenovarForm',false)">Cancelar</button>
    </div>
  </div>` : "";

  const listHtml = !state.renovar.length && !state.showRenovarForm
    ? `<div class="empty"><div class="empty-icon">🔄</div><div>Nenhum item cadastrado ainda.</div></div>`
    : state.renovar.map(r => {
        const st = renovarStatus(r);
        const isEditing = state.editingRenovarId === r.id;
        const badgeCls = st==="ok"?"renovar-badge-ok":st==="warn"?"renovar-badge-warn":st==="vencido"?"renovar-badge-vencido":"renovar-badge-neutro";
        const stLabel = {"ok":"Em dia","warn":"Vencendo","vencido":"Vencido","neutro":"Sem data"}[st];
        let countdown = "";
        if (r.vencimento) {
          const diff = Math.ceil((new Date(r.vencimento) - new Date()) / 86400000);
          const fmt = new Date(r.vencimento+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"});
          countdown = diff < 0 ? `Venceu há ${Math.abs(diff)}d (${fmt})` : `Vence em ${diff}d (${fmt})`;
        }
        return `<div class="renovar-card ${st}">
          <div class="renovar-card-header">
            <div>
              <div class="renovar-card-nome">${RENOVAR_TIPO_EMOJIS[r.tipo]||"🔄"} ${esc(r.nome)}</div>
              <div class="renovar-card-tipo">${esc(r.tipo||"")} ${r.recorrencia?`· ${r.recorrencia}`:""} ${r.responsavel?`· 👤 ${r.responsavel}`:""}</div>
            </div>
            <button class="renovar-edit-btn" onclick="startEditRenovar(${r.id})">✏️</button>
          </div>
          <div class="renovar-card-meta">
            <span class="renovar-badge ${badgeCls}">${stLabel}</span>
            ${countdown?`<span class="renovar-countdown" style="color:${st==="vencido"?"#C04040":st==="warn"?"#C09030":"#888"}">${countdown}</span>`:""}
          </div>
          ${r.notas?`<div style="font-size:11px;color:#888;margin-top:6px;background:#F9F7F4;border-radius:6px;padding:5px 8px">${esc(r.notas)}</div>`:""}
          ${isEditing?`<div class="renovar-edit-inline">
            ${buildRenovarForm(r,"re-"+r.id)}
            <div class="renovar-edit-actions">
              <button class="renovar-save-btn" onclick="saveRenovarEdit(${r.id})">✓ Salvar</button>
              <button class="renovar-cancel-btn" onclick="S('editingRenovarId',null)">Cancelar</button>
              <button class="renovar-del-btn" onclick="deleteRenovar(${r.id})">🗑</button>
            </div>
          </div>`:""}
        </div>`;
      }).join("");

  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#1C1C1E">🔄 ${state.renovar.length} Renovações</div>
    <button class="renovar-new-btn" onclick="S('showRenovarForm',!state.showRenovarForm)">${state.showRenovarForm?"✕ Fechar":"+ Novo"}</button>
  </div>
  ${headerHtml}${formHtml}${listHtml}`;
}

window.saveNewRenovar = async function() {
  const data = readRenovarForm("rn");
  if (!data.nome) { alert("Nome é obrigatório"); return; }
  const item = { ...data, id: Date.now() * 1000 + Math.floor(Math.random() * 1000) };
  state.showRenovarForm = false;
  render();
  await fbSaveRenovar(item);
};
window.startEditRenovar = function(id) {
  state.editingRenovarId = state.editingRenovarId === id ? null : id;
  render();
};
window.saveRenovarEdit = async function(id) {
  const data = readRenovarForm("re-"+id);
  const item = state.renovar.find(r => r.id === id);
  if (!item) return;
  Object.assign(item, data);
  state.editingRenovarId = null;
  render();
  await fbSaveRenovar(item);
};
window.deleteRenovar = async function(id) {
  if (!confirm("Remover este item?")) return;
  state.editingRenovarId = null;
  render();
  await fbDeleteRenovar(id);
};

// ── MERCADO ────────────────────────────────────────────────────────
function buildMercado() {
  const casa = state.mercadoCasa;
  const search = (state.mercadoSearch||"").toLowerCase();
  const allItems = state.tasks.filter(t => t.group === "mercado" && t.mercadoCasa === casa);
  const filtered = search ? allItems.filter(t => (t.text||"").toLowerCase().includes(search)) : allItems;
  const pending = filtered.filter(t => !t.done);
  const done    = filtered.filter(t =>  t.done);

  // Agrupar por categoria automática
  const cats = {};
  pending.forEach(t => {
    const cat = t.mercadoCat || inferMercadoCat(t.text);
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(t);
  });
  const sortedCats = [...MERCADO_CATS.filter(c => cats[c]), ...Object.keys(cats).filter(c => !MERCADO_CATS.includes(c))];

  const statsHtml = `<div class="mercado-stats">
    <div class="mercado-stat"><div class="mercado-stat-num">${pending.length}</div><div class="mercado-stat-lbl">A Comprar</div></div>
    <div class="mercado-stat"><div class="mercado-stat-num">${done.length}</div><div class="mercado-stat-lbl">✓ Comprado</div></div>
    <div class="mercado-stat"><div class="mercado-stat-num">${allItems.length}</div><div class="mercado-stat-lbl">Total Lista</div></div>
  </div>`;

  const formHtml = `<div class="mercado-add-form">
    <div class="mercado-add-row">
      <input id="mercado-input" class="mercado-add-input" placeholder="Adicionar produto..." onkeydown="if(event.key==='Enter')addMercadoItem()">
      <input id="mercado-qty" class="mercado-qty-input" type="text" placeholder="Qtd" value="1">
      <button class="mercado-add-btn" onclick="addMercadoItem()">+</button>
    </div>
  </div>`;

  const listHtml = !pending.length && !done.length
    ? `<div class="empty"><div class="empty-icon">🧺</div><div>Lista vazia para ${casa}.</div></div>`
    : sortedCats.map(cat => {
        const items = cats[cat];
        if (!items || !items.length) return "";
        return `<div class="mercado-cat-section">
          <div class="mercado-cat-header">
            <span style="font-size:16px">${MERCADO_CAT_EMOJIS[cat]||"📦"}</span>
            <span class="mercado-cat-title">${cat}</span>
            <span class="mercado-cat-count">${items.length}</span>
          </div>
          ${items.map(t => `<div class="mercado-item${t.done?" done":""}">
            <button class="mercado-item-check${t.done?" done":""}" onclick="toggleTask(${t.id})">${t.done?"✓":""}</button>
            <span class="mercado-item-nome${t.done?" done":""}">${esc(t.text)}</span>
            ${t.qty&&t.qty!=="1"?`<span class="mercado-item-qty">${esc(t.qty)}</span>`:""}
            <button class="mercado-del-btn" onclick="deleteTask(${t.id})">✕</button>
          </div>`).join("")}
        </div>`;
      }).join("")
    + (done.length ? `<div class="section-label" style="margin-top:16px">✓ COMPRADO (${done.length})</div>
        ${done.map(t => `<div class="mercado-item done">
          <button class="mercado-item-check done" onclick="toggleTask(${t.id})">✓</button>
          <span class="mercado-item-nome done">${esc(t.text)}</span>
          ${t.qty&&t.qty!=="1"?`<span class="mercado-item-qty">${esc(t.qty)}</span>`:""}
          <button class="mercado-del-btn" onclick="deleteTask(${t.id})">✕</button>
        </div>`).join("")}` : "");

  return `<div class="mercado-header">
    <div class="mercado-casa-selector">
      ${MERCADO_CASAS.map(c => `<button class="mercado-casa-btn${c===state.mercadoCasa?" active":""}" onclick="S('mercadoCasa','${c}')">${MERCADO_CASA_EMOJIS[c]} ${c}</button>`).join("")}
    </div>
    <input id="mercado-search" class="mercado-search" placeholder="🔍 Filtrar lista..." oninput="S('mercadoSearch',this.value)" value="${esc(state.mercadoSearch||'')}">
  </div>
  ${statsHtml}
  ${formHtml}
  ${listHtml}`;
}

window.addMercadoItem = async function() {
  const inp = document.getElementById('mercado-input');
  const qtyEl = document.getElementById('mercado-qty');
  const text = inp ? inp.value.trim() : "";
  if (!text) return;
  const qty = qtyEl ? qtyEl.value.trim() || "1" : "1";
  const cat = inferMercadoCat(text);
  const task = {
    id: Date.now() * 1000 + Math.floor(Math.random() * 1000),
    text, group: "mercado", assignee: state.assignee,
    done: false, dueDate: null, dueTime: null, address: null, notes: null,
    house: null, createdAt: new Date().toLocaleDateString("pt-BR"),
    mercadoCasa: state.mercadoCasa, mercadoCat: cat, qty,
  };
  render();
  if (inp) { inp.value = ""; inp.focus(); }
  if (qtyEl) qtyEl.value = "1";
  await fbSaveTask(task);
};

// ── DASHBOARD ──────────────────────────────────────────────────────
function buildDashboard() {
  const today = new Date().toISOString().split("T")[0];
  const me = state.dashFilter;

  // Stats por grupo
  const TASK_GROUPS_DASH = ["casa","compras","dejulie","viladejulie","saude","viagens","outros"];
  const groupNames = {"casa":"Casa","compras":"Compras","dejulie":"Dejulie","viladejulie":"Vila Dejulie","saude":"Saúde","viagens":"Viagens","outros":"Outros"};
  const groupEmojis = {"casa":"🏠","compras":"🛒","dejulie":"💛","viladejulie":"🏡","saude":"🏥","viagens":"✈️","outros":"🎯"};

  const totalPend = state.tasks.filter(t => !t.done && (me==="Todos" || t.assignee===me || t.assignee==="Casal" || t.assignee==="Família")).length;
  const totalDone = state.tasks.filter(t => t.done && (me==="Todos" || t.assignee===me || t.assignee==="Casal" || t.assignee==="Família")).length;
  const vencendo  = state.tasks.filter(t => !t.done && t.dueDate && t.dueDate >= today && t.dueDate <= today.substring(0,7)+"-"+String(new Date().getDate()+7).padStart(2,"0")).length;
  const vencidas  = state.tasks.filter(t => !t.done && t.dueDate && t.dueDate < today).length;
  const renovarWarn = state.renovar.filter(r => {
    if (!r.vencimento) return false;
    const diff = (new Date(r.vencimento) - new Date()) / 86400000;
    return diff >= 0 && diff <= 30;
  }).length;
  const renovarVenc = state.renovar.filter(r => r.vencimento && r.vencimento < today).length;

  // Próximas viagens
  const trips = {};
  state.tasks.filter(t => t.group === "viagens").forEach(t => {
    const name = t.travelName || "Próxima viagem";
    if (!trips[name]) trips[name] = { date: t.travelDate||null, total:0, done:0 };
    if (t.travelDate && (!trips[name].date || t.travelDate < trips[name].date)) trips[name].date = t.travelDate;
    trips[name].total++; if (t.done) trips[name].done++;
  });
  const nextTrips = Object.entries(trips)
    .filter(([,v]) => v.date && v.date >= today)
    .sort(([,a],[,b]) => a.date < b.date ? -1 : 1)
    .slice(0, 4);

  // Próximos FDS
  const weeks = Object.entries(state.fds || {}).filter(([k]) => k >= today).sort().slice(0,3);
  const allWeekData = generateWeekends().filter(w => w.key >= today).slice(0,3);

  // Tarefas com prazo próximo
  const upcoming = state.tasks.filter(t => !t.done && t.dueDate && t.dueDate >= today)
    .filter(t => me==="Todos" || t.assignee===me || t.assignee==="Casal" || t.assignee==="Família")
    .sort((a,b) => a.dueDate < b.dueDate ? -1 : 1).slice(0,5);

  // Renovar vencendo
  const renovarUpcoming = state.renovar.filter(r => r.vencimento && r.vencimento >= today)
    .sort((a,b) => a.vencimento < b.vencimento ? -1 : 1).slice(0,3);

  const statsHtml = `<div class="dash-stats-grid">
    <div class="dash-stat"><div class="dash-stat-num">${totalPend}</div><div class="dash-stat-lbl">Pendentes</div></div>
    <div class="dash-stat"><div class="dash-stat-num" style="color:#7BBF7B">${totalDone}</div><div class="dash-stat-lbl">Concluídas</div></div>
    <div class="dash-stat"><div class="dash-stat-num" style="color:#C07070">${vencidas}</div><div class="dash-stat-lbl">Vencidas</div></div>
    <div class="dash-stat"><div class="dash-stat-num" style="color:#F7D070">${vencendo}</div><div class="dash-stat-lbl">Venc. 7 dias</div></div>
    <div class="dash-stat"><div class="dash-stat-num" style="color:#D4956A">${renovarWarn}</div><div class="dash-stat-lbl">Renovar 30d</div></div>
    <div class="dash-stat"><div class="dash-stat-num">${state.imoveis.length}</div><div class="dash-stat-lbl">Imóveis</div></div>
  </div>`;

  const tripsHtml = nextTrips.length ? nextTrips.map(([name, info]) => {
    const days = Math.ceil((new Date(info.date) - new Date()) / 86400000);
    const fmt = new Date(info.date+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});
    const pct = info.total ? Math.round(info.done/info.total*100) : 0;
    return `<div class="dash-trip-card">
      <div class="dash-trip-days">${days}d</div>
      <div class="dash-trip-info">
        <div class="dash-trip-name">✈️ ${esc(name)}</div>
        <div class="dash-trip-date">${fmt} · ${info.done}/${info.total} tarefas</div>
        <div class="trip-progress-bar" style="margin-top:4px"><div class="trip-progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join("") : '<div class="empty" style="padding:12px">Nenhuma viagem com data próxima</div>';

  const fdsHtml = allWeekData.map(w => {
    const saved = state.fds[w.key] || {};
    const isa   = saved.isa_who !== undefined ? saved.isa_who : w.isaDefault;
    const joa   = saved.joa_who !== undefined ? saved.joa_who : w.joaDefault;
    const evento = saved.event  !== undefined ? saved.event  : w.event;
    const isaIsMe = isa === me || me === "Todos";
    const joaIsMe = joa === me || me === "Todos";
    return `<div class="dash-fds-card" style="flex-direction:column;align-items:stretch;gap:6px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="dash-fds-dates">${w.fri} – ${w.sun}</div>
        <div class="dash-fds-who">
          <span class="dash-fds-person${isaIsMe?" highlight":""}">👧 ${esc(isa)}</span>
          <span class="dash-fds-person${joaIsMe?" highlight":""}">👦 ${esc(joa)}</span>
        </div>
      </div>
      ${evento ? `<div style="font-size:11px;color:#E65C00;background:#FFF5EC;border-radius:6px;padding:3px 8px;font-weight:600">⭐ ${esc(evento)}</div>` : ""}
    </div>`;
  }).join("");

  const upcomingHtml = upcoming.map(t => {
    const days = Math.ceil((new Date(t.dueDate) - new Date()) / 86400000);
    const grpEmoji = groupEmojis[t.group] || "📌";
    const grpName  = GNAMES[t.group] || t.group;
    const daysColor = days === 0 ? "#C04040" : days <= 3 ? "#C07040" : "#AAA";
    const daysLabel = days === 0 ? "hoje" : days === 1 ? "1d" : `${days}d`;
    return `<div class="dash-task-row" style="cursor:pointer" onclick="setGroup('${t.group}')">
      <span style="font-size:11px;font-weight:700;color:${daysColor};min-width:32px">${daysLabel}</span>
      <span class="dash-task-text">${esc(t.text)}</span>
      <span class="dash-task-group" style="display:flex;gap:3px;align-items:center">
        <span>${grpEmoji} ${esc(grpName)}</span>
        <span style="background:#E8E0D8;color:#666;border-radius:5px;padding:1px 5px;font-size:10px">👤 ${esc(t.assignee||"")}</span>
      </span>
    </div>`;
  }).join("") || '<div style="font-size:12px;color:#CCC;padding:8px 0">Nenhuma tarefa com prazo próximo</div>';

  const renovarHtml = renovarUpcoming.map(r => {
    const days = Math.ceil((new Date(r.vencimento) - new Date()) / 86400000);
    const cls = days <= 7 ? "renovar-badge-vencido" : days <= 30 ? "renovar-badge-warn" : "renovar-badge-ok";
    const fmt = new Date(r.vencimento+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});
    return `<div class="dash-task-row">
      <span class="renovar-badge ${cls}" style="min-width:40px;text-align:center">${days}d</span>
      <span class="dash-task-text">${esc(r.nome)}</span>
      <span class="dash-task-group">${RENOVAR_TIPO_EMOJIS[r.tipo]||"🔄"}</span>
    </div>`;
  }).join("") || '<div style="font-size:12px;color:#CCC;padding:8px 0">Nenhum item a renovar em breve</div>';

  return `
    <div class="dash-filter-bar">
      ${["Todos","Daniel","Natalia"].map(f =>
        `<button class="dash-filter-btn${state.dashFilter===f?" active":""}" onclick="S('dashFilter','${f}')">${f}</button>`
      ).join("")}
