<style>

.content { padding: 20px 16px; }

.task-row { display: flex; align-items: center; gap: 10px; }

.task-meta { font-size: 11px; color: #BBBBB0; margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
.meta-tag { background: #F5F0E8; border-radius: 6px; padding: 1px 7px; font-weight: 500; }

.task-notes-label { font-size: 10px; color: #AAA; display: block; margin-bottom: 2px; }
.add-note-btn { background: none; border: none; font-size: 12px; color: #BBBBB0; cursor: pointer; margin-top: 4px; padding: 2px 0; }

.note-actions { display: flex; gap: 8px; margin-top: 6px; }
.note-save { flex: 1; padding: 6px; border-radius: 8px; border: none; background: var(--gc); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; }

.empty { text-align: center; padding: 32px 20px; color: #C0B8B0; font-size: 14px; }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.travel-group-section { margin-bottom: 20px; }
.travel-trip-title { font-family: 'Playfair Display', serif; color: #B5A8D8; font-size: 15px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #2C2050; }
.travel-group-label, .health-group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; color: #B5A8D8; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.health-group-label { color: #7EC8C8; }
.travel-trip-name { font-size: 11px; background: #2C2050; color: #B5A8D8; border-radius: 6px; padding: 2px 8px; font-weight: 500; }
.health-count-tag { font-size: 11px; background: #0D3030; color: #7EC8C8; border-radius: 6px; padding: 2px 8px; font-weight: 500; }
.contacts-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.contacts-title { font-family: 'Playfair Display', serif; font-size: 18px; color: #1C1C1E; font-weight: 700; }
.new-contact-btn { background: var(--gc); border: none; border-radius: 12px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; color: #1C1C1E; }
.contact-form { background: #fff; border-radius: 18px; padding: 18px; margin-bottom: 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.contact-form-title { font-size: 14px; font-weight: 600; color: #1C1C1E; margin-bottom: 14px; }
.contact-photo-upload { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.photo-preview, .photo-placeholder { width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--gc); }
.photo-preview { object-fit: cover; cursor: pointer; }
.photo-placeholder { background: #F5F0E8; border-style: dashed; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
.photo-label { font-size: 12px; color: #999; cursor: pointer; }
.photo-label span { color: var(--gc); font-weight: 600; text-decoration: underline; }
.contact-field { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.contact-field-label { font-size: 12px; color: #999; width: 72px; flex-shrink: 0; font-weight: 500; }
.contact-field-input, .contact-field-select { flex: 1; border: 1.5px solid #E8E0D8; border-radius: 10px; padding: 8px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: #FAFAF8; outline: none; color: #1C1C1E; }
.contact-field-input:focus, .contact-field-select:focus { border-color: var(--gc); }
.contact-form-actions { display: flex; gap: 8px; margin-top: 14px; }
.contact-save-btn { flex: 1; background: var(--gc); border: none; border-radius: 12px; padding: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; color: #1C1C1E; }

.contacts-search:focus { border-color: var(--gc); }
.contacts-section-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #C8A87E; text-transform: uppercase; margin: 14px 0 8px; }
.contact-card { background: #fff; border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); margin-bottom: 8px; }
.contact-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--gc); }
.contact-avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: #F5F0E8; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; border: 2px solid var(--gc); }
.contact-info { flex: 1; min-width: 0; }
.contact-name { font-size: 15px; font-weight: 600; color: #1C1C1E; }
.contact-company { font-size: 12px; color: #888; margin-top: 1px; }
.contact-links { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.contact-link { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #F5F0E8; color: #666; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }
.contact-delete-btn { background: none; border: none; color: #D0C8C0; cursor: pointer; font-size: 15px; padding: 4px; align-self: flex-start; }

/* FDS */
.fds-outer { display: flex; gap: 16px; align-items: flex-start; }
.fds-col { flex: 1; min-width: 0; }
.fds-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.fds-block-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: #1C1C1E; margin: 0 0 8px; text-align: center; }
.fds-block { background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 24px; }

.fds-table th { background: #1C1C1E; color: #F5F0E8; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; padding: 8px 4px; text-align: center; }
.fds-table th:first-child { text-align: left; padding-left: 8px; }
.fds-row-green td { background: #4CAF50; color: #fff; font-weight: 600; }
.fds-row-white td { background: #fff; color: #1C1C1E; }
.fds-table td { padding: 6px 4px; text-align: center; border-bottom: 1px solid #F0EDE8; font-size: 11px; }
.fds-table td:first-child { text-align: left; padding-left: 8px; }

.fds-row-green .fds-who-select { color: #fff; }
.fds-row-green .fds-who-select option { color: #1C1C1E; background: #fff; }
.fds-obs-row td { padding: 3px 8px 7px !important; background: #F9F7F4 !important; border-bottom: 2px solid #E8E0D8 !important; }
.fds-obs-inner { display: flex; flex-direction: column; gap: 4px; }
.fds-obs-input { width: 100%; border: 1.5px solid #E8E0D8; border-radius: 8px; padding: 4px 8px; font-family: 'DM Sans', sans-serif; font-size: 11px; background: #fff; outline: none; color: #555; resize: none; }
.fds-obs-input:focus { border-color: #7BBF8E; }
.fds-obs-input::placeholder { color: #BBBBB0; }
.fds-event-input { width: 100%; border: 1.5px solid #FFD0A0; border-radius: 6px; padding: 3px 7px; font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700; background: #FFF5EC; outline: none; color: #E65C00; resize: none; }
.fds-event-input:focus { border-color: #E65C00; }
.fds-event-input::placeholder { color: #FFBB88; font-weight: 400; }
.fds-event-label { font-size: 9px; color: #E65C00; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; }
.loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-size: 14px; color: #888; flex-direction: column; gap: 12px; background: #F5F0E8; }
.loading-spinner { width: 32px; height: 32px; border: 3px solid #E8E0D8; border-top-color: #E8A87C; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.task-card, .contact-card { animation: slideIn 0.2s ease; }
</style>

<div id="app">

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── FIREBASE CONFIG ────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAx95UFNGaNFe-SGgFnZFcx-3TDFH_U92o",
  authDomain: "familia-app-5cd84.firebaseapp.com",
  databaseURL: "https://familia-app-5cd84-default-rtdb.firebaseio.com",
  projectId: "familia-app-5cd84",
  storageBucket: "familia-app-5cd84.firebasestorage.app",
  messagingSenderId: "419411824094",
  appId: "1:419411824094:web:3f84321668c3aab892214f",
  measurementId: "G-9VET0V5QGQ"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── CONSTANTS ──────────────────────────────────────────────────────
const GROUPS = [
  { id: "casa",        label: "Casa",        emoji: "🏠", color: "#E8A87C" },
  { id: "compras",     label: "Compras",     emoji: "🛒", color: "#85C1A3" },
  { id: "dejulie",     label: "Dejulie",     emoji: "💛", color: "#F7D070" },
  { id: "viladejulie", label: "Vila Dejulie",emoji: "🏡", color: "#F0A8C0" },
  { id: "saude",       label: "Saúde",       emoji: "🏥", color: "#7EC8C8" },
  { id: "viagens",     label: "Viagens",     emoji: "✈️", color: "#B5A8D8" },
  { id: "contatos",    label: "Contatos",    emoji: "👥", color: "#C8A87E" },
  { id: "fds",         label: "FDS",         emoji: "📅", color: "#7BBF8E" },
  { id: "outros",      label: "Outros",      emoji: "🎯", color: "#A8B8D8" },
];
const HOUSES = [
  { id: "itaim",     label: "Itaim",     emoji: "🏙" },
  { id: "itanhaem",  label: "Itanhaém",  emoji: "🏖" },
  { id: "jacuma",    label: "Jacumã",    emoji: "🌴" },
];
const HEALTH_CATS   = ["Remédio","Exame","Médico","Dentista","Outros"];
const HEALTH_EMOJIS = {"Remédio":"💊","Exame":"🔬","Médico":"👨‍⚕️","Dentista":"🦷","Outros":"🏥"};
const TRAVEL_CATS   = ["Aéreo","Documentos","Hospedagem","Transporte","Passeios","Bagagem","Saúde","Outros"];
const CONTACT_SECS  = ["Viagens","Dejulie","Vila Dejulie","Serviço","Outros"];
const ASSIGNEES     = ["Daniel","Natalia","Casal","Joaquim","Isabelle","Família"];

// ── STATE ──────────────────────────────────────────────────────────
let state = {
  activeGroup: "casa", tasks: [], contacts: [],
  assignee: "Daniel",
  dueDate: "", dueTime: "", addToCalendar: false,
  travelName: "", travelCategory: "Documentos",
  healthCategory: "Médico", selectedHouse: null,
  showContactForm: false, contactSearch: "",
  cf: { photo:null, name:"", company:"", section:"Outros", city:"", phone:"", site:"", email:"" },
  editingNotes: {}, notesVal: {},
  syncStatus: "syncing",
  fds: {},
  hidePast: true,
};

// ── FIREBASE SYNC ──────────────────────────────────────────────────
// Listen for real-time updates
onValue(ref(db, "tasks"), snap => {
  const data = snap.val();
  state.tasks = data ? Object.values(data).sort((a,b) => b.id - a.id) : [];
  state.syncStatus = "online";
  safeRender();
}, err => { state.syncStatus = "offline"; safeRender(); });

onValue(ref(db, "contacts"), snap => {
  const data = snap.val();
  state.contacts = data ? Object.values(data).sort((a,b) => b.id - a.id) : [];
  safeRender();
});

onValue(ref(db, "fds"), snap => {
  state.fds = snap.val() || {};
  const active = document.activeElement;
  if (active && active.classList.contains("fds-event-input")) return;
  render();
});

async function fbSaveFds(weekKey, data) {
  try { await set(ref(db, `fds/${weekKey}`), data); }
  catch(e) { console.error("fbSaveFds:", e); setSyncStatus("offline"); }
}

async function fbSaveTask(task) {
  setSyncStatus("syncing");
  try { await set(ref(db, `tasks/${task.id}`), task); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbSaveTask:", e); }
}
async function fbDeleteTask(id) {
  setSyncStatus("syncing");
  try { await remove(ref(db, `tasks/${id}`)); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbDeleteTask:", e); }
}
async function fbUpdateTask(id, fields) {
  setSyncStatus("syncing");
  try { await update(ref(db, `tasks/${id}`), fields); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbUpdateTask:", e); }
}
async function fbSaveContact(contact) {
  setSyncStatus("syncing");
  try { await set(ref(db, `contacts/${contact.id}`), contact); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbSaveContact:", e); }
}
async function fbDeleteContact(id) {
  setSyncStatus("syncing");
  try { await remove(ref(db, `contacts/${id}`)); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbDeleteContact:", e); }
}

function setSyncStatus(s) {
  state.syncStatus = s;
  const el = document.getElementById("sync-badge");
  if (!el) return;
  if (s === "syncing") { el.textContent = "⏳ Sincronizando..."; el.className = "sync-badge syncing"; }
  else if (s === "online") { el.textContent = "🟢 Sincronizado"; el.className = "sync-badge"; }
  else { el.textContent = "🔴 Offline"; el.className = "sync-badge offline"; }
}

// ── RENDER ──────────────────────────────────────────────────────────
// safeRender: used by Firebase listeners — won't re-render if user is typing in a text input
function safeRender() {
  const active = document.activeElement;
  const inputTags = ["INPUT","TEXTAREA","SELECT"];
  const typingInputIds = ["main-input","travel-name-input","address-input","notes-input","contacts-search"];
  if (active && inputTags.includes(active.tagName) && (typingInputIds.includes(active.id) || active.classList.contains("fds-event-input"))) {
    // Update sync badge without full re-render
    setSyncStatus(state.syncStatus);
    return;
  }
  render();
}

function render() {
  const g = GROUPS.find(g => g.id === state.activeGroup);
  if (!g) return;
  document.documentElement.style.setProperty("--gc", g.color);
  const appEl = document.getElementById("app");
  if (appEl) appEl.innerHTML = buildApp();
}

function buildApp() {
  const groupTasks = state.tasks.filter(t => t.group === state.activeGroup);
  const pending = groupTasks.filter(t => !t.done);
  const done    = groupTasks.filter(t =>  t.done);
  const syncLabel = state.syncStatus === "syncing" ? "⏳ Sincronizando..."
    : state.syncStatus === "offline" ? "🔴 Offline" : "🟢 Sincronizado";
  const syncClass = state.syncStatus === "syncing" ? "sync-badge syncing"
    : state.syncStatus === "offline" ? "sync-badge offline" : "sync-badge";

  return `
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Assistente<br>Família</div>
        <div class="header-sub">Daniel &amp; Natalia</div>
      </div>
      <div id="sync-badge" class="${syncClass}">${syncLabel}</div>
    </div>
    <div class="groups-nav">
      ${GROUPS.map(g => `<button class="group-tab${g.id===state.activeGroup?" active":""}"
        style="${g.id===state.activeGroup?`background:${g.color}`:""}"
        onclick="setGroup('${g.id}')">${g.emoji} ${g.label}</button>`).join("")}
    </div>
  </div>
  <div class="content">
    <div class="sync-note">
      <span style="font-size:18px">☁️</span>
      <div class="sync-note-text"><strong>Sincronização em tempo real</strong> — alterações aparecem nos dois celulares instantaneamente.</div>
    </div>
    ${state.activeGroup === "contatos" ? buildContacts() : state.activeGroup === "fds" ? buildFDS() : buildTasksSection(pending, done, groupTasks)}
  </div>`;
}

function buildTasksSection(pending, done, groupTasks) {
  const pct = groupTasks.length > 0 ? Math.round((done.length/groupTasks.length)*100) : 0;
  return `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${pending.length}</div><div class="stat-lbl">Pendentes</div></div>
      <div class="stat-card"><div class="stat-num">${done.length}</div><div class="stat-lbl">Concluídas</div></div>
      <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-lbl">Progresso</div></div>
    </div>
    ${buildGroupHeader()}
    ${buildHouseSelector()}
    ${buildAddForm()}
    ${buildTaskLists(pending, done, groupTasks)}`;
}

function buildGroupHeader() {
  if (state.activeGroup === "viagens") return `
    <div class="travel-header">
      <div class="travel-header-title">✈️ Planejamento</div>
      <input id="travel-name-input" class="travel-name-input" placeholder="Nome da viagem (ex: Ushuaia Junho)"
        value="${esc(state.travelName)}">
      <div class="travel-cats">
        ${TRAVEL_CATS.map(c=>`<button class="travel-cat-btn${c===state.travelCategory?" active":""}"
          onclick="S('travelCategory','${c}')">${c}</button>`).join("")}
      </div>
    </div>`;
  if (state.activeGroup === "saude") return `
    <div class="health-header">
      <div class="health-header-title">🏥 Categoria</div>
      <div class="health-cats">
        ${HEALTH_CATS.map(c=>`<button class="health-cat-btn${c===state.healthCategory?" active":""}"
          onclick="S('healthCategory','${c}')">${c}</button>`).join("")}
      </div>
    </div>`;

}

function buildHouseSelector() {
  if (state.activeGroup!=="casa" && state.activeGroup!=="compras") return "";
  return `<div class="house-selector">
    <div class="house-selector-title">🏡 Casa</div>
    <div class="house-btns">
      <button class="house-btn${state.selectedHouse===null?" active":""}" onclick="S('selectedHouse',null)">Todas</button>

        onclick="S('selectedHouse','${h.id}')">${h.emoji} ${h.label}</button>`).join("")}
    </div>

function buildAddForm() {
  const g = GROUPS.find(g=>g.id===state.activeGroup);
  const hName = state.selectedHouse ? HOUSES.find(h=>h.id===state.selectedHouse) : null;
  const ph = state.activeGroup==="viagens" ? `Nova tarefa — ${state.travelCategory}...`
    : state.activeGroup==="saude" ? `Nova tarefa — ${state.healthCategory}...`

    : `Nova tarefa em ${g?.label}...`;

    <div class="add-row">
      <input id="main-input" class="add-input" placeholder="${ph}"

    </div>
    <div class="assignee-row">
      <span class="assignee-label">Para:</span>
      ${ASSIGNEES.map(a=>`<button class="assignee-btn${a===state.assignee?" active":""}"
        onclick="S('assignee','${a}')">${a}</button>`).join("")}
    </div>
    <div class="due-date-row">
      <span class="due-date-label">📅 Prazo:</span>
      <input id="due-date-input" type="date" class="due-date-input" value="${state.dueDate}" onchange="onDueDateChange(this.value)">
      <input id="due-time-input" type="time" class="due-date-input time-input" value="${state.dueTime}"
        ${!state.dueDate?"disabled":""} onchange="state.dueTime=this.value">
    </div>
    <div id="cal-toggle-wrap">${state.dueDate?`<label class="cal-toggle">
      <input type="checkbox" ${state.addToCalendar?"checked":""} onchange="state.addToCalendar=this.checked">
      Adicionar à agenda
    </label>`:""}</div>
    <div class="address-row">

    <div class="notes-row">
      <textarea id="notes-input" class="notes-input" placeholder="💬 Observações (opcional)..."></textarea>
    </div>

}

function buildTaskLists(pending, done, groupTasks) {
  if (state.activeGroup==="viagens") return buildTravelList(pending, done);
  if (state.activeGroup==="saude")   return buildHealthList(pending, done);
  let html = "";
  if (pending.length) html += `<div class="section-label">A FAZER</div><div class="task-list">${pending.map(buildTaskCard).join("")}</div>`;
  if (done.length)    html += `<div class="section-label">CONCLUÍDAS</div><div class="task-list">${done.map(buildTaskCard).join("")}</div>`;
  if (!groupTasks.length) html += `<div class="empty"><div class="empty-icon">${GROUPS.find(g=>g.id===state.activeGroup)?.emoji}</div><div>Nenhuma tarefa ainda.</div></div>`;
  return html;
}

function buildTravelList(pending, done) {
  const trips = {};
  [...pending,...done].forEach(t => {
    const trip = t.travelName||"Próxima viagem", cat = t.travelCategory||"Outros";
    if (!trips[trip]) trips[trip]={};
    if (!trips[trip][cat]) trips[trip][cat]=[];
    trips[trip][cat].push(t);
  });
  if (!Object.keys(trips).length) return `<div class="empty"><div class="empty-icon">✈️</div><div>Nenhuma tarefa de viagem.</div></div>`;
  return Object.entries(trips).map(([trip,cats])=>`
    <div class="travel-group-section">
      <div class="travel-trip-title">✈️ ${trip}</div>
      ${Object.entries(cats).map(([cat,tasks])=>`
        <div style="margin-bottom:16px">
          <div class="travel-group-label">${cat}
            <span class="travel-trip-name">${tasks.filter(t=>t.done).length}/${tasks.length}</span>
          </div>
          <div class="task-list">${tasks.map(buildTaskCard).join("")}</div>
        </div>`).join("")}
    </div>`).join("");
}

function buildHealthList(pending, done) {
  const cats = {};
  [...pending,...done].forEach(t => {
    const cat = t.healthCategory||"Outros";
    if (!cats[cat]) cats[cat]=[];
    cats[cat].push(t);
  });
  const sorted = [...HEALTH_CATS.filter(c=>cats[c]),...Object.keys(cats).filter(c=>!HEALTH_CATS.includes(c))];
  if (!sorted.length) return `<div class="empty"><div class="empty-icon">🏥</div><div>Nenhuma tarefa de saúde.</div></div>`;
  return sorted.map(cat=>`
    <div style="margin-bottom:20px">
      <div class="health-group-label">${HEALTH_EMOJIS[cat]||"🏥"} ${cat}
        <span class="health-count-tag">${cats[cat].filter(t=>t.done).length}/${cats[cat].length}</span>
      </div>
      <div class="task-list">${cats[cat].map(buildTaskCard).join("")}</div>
    </div>`).join("");
}

function buildTaskCard(task) {
  const today = new Date().toISOString().split("T")[0];
  const overdue = task.dueDate && !task.done && task.dueDate < today;
  let dueFmt = task.dueDate
    ? new Date(task.dueDate+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"})
      + (task.dueTime?` às ${task.dueTime}`:"")
    : "";
  const h = task.house ? HOUSES.find(h=>h.id===task.house) : null;
  const mapsUrl = task.address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(task.address)}` : null;
  const isEditing = state.editingNotes[task.id];
  const notesVal = state.notesVal[task.id]!==undefined ? state.notesVal[task.id] : (task.notes||"");
  return `<div class="task-card${task.done?" done":""}">
    <div class="task-row">
      <button class="check-btn${task.done?" done":""}" onclick="toggleTask(${task.id})">${task.done?"✓":""}</button>
      <div class="task-body">
        <div class="task-text${task.done?" done":""}">${esc(task.text)}</div>
        <div class="task-meta">
          <span class="meta-tag">👤 ${task.assignee}</span>
          ${h?`<span class="house-tag">${h.emoji} ${h.label}</span>`:""}
          ${dueFmt?`<span class="due-tag${task.done?" done-tag":overdue?" overdue":""}">${task.done?"✓ ":overdue?"⚠ ":"📅 "}${dueFmt}</span>`:""}
          <span>${task.createdAt}</span>
        </div>
      </div>
      <button class="delete-btn" onclick="deleteTask(${task.id})">✕</button>
    </div>
    ${mapsUrl?`<div class="task-address"><a href="${mapsUrl}" target="_blank" class="map-link">📍 ${esc(task.address)}</a></div>`:""}
    <div style="margin-top:6px">
      ${isEditing?`
        <textarea class="notes-edit-input" oninput="setNoteVal(${task.id},this.value)"
          placeholder="Escreva observações...">${esc(notesVal)}</textarea>
        <div class="note-actions">
          <button class="note-save" onclick="saveNote(${task.id})">Salvar</button>
          <button class="note-cancel" onclick="cancelNote(${task.id})">Cancelar</button>
        </div>`:
      task.notes?`
        <div class="task-notes" onclick="startEditNote(${task.id})">
          <span class="task-notes-label">💬 Observações (toque para editar)</span>
          ${esc(task.notes)}
        </div>`:
      `<button class="add-note-btn" onclick="startEditNote(${task.id})">+ Adicionar observação</button>`}
    </div>
  </div>`;
}

function buildContacts() {
  const cf = state.cf;
  return `
    <div class="contacts-header">
      <div class="contacts-title">👥 ${state.contacts.length} Contatos</div>
      <button class="new-contact-btn" onclick="toggleContactForm()">${state.showContactForm?"✕ Fechar":"+ Novo"}</button>
    </div>
    ${state.showContactForm?`
    <div class="contact-form">
      <div class="contact-form-title">Novo Contato</div>
      <div class="contact-photo-upload">
        ${cf.photo?`<img src="${cf.photo}" class="photo-preview" onclick="triggerPhotoUpload()" alt="foto">`:
          `<div class="photo-placeholder" onclick="triggerPhotoUpload()">📷</div>`}
        <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhotoUpload(this)">
        <label class="photo-label" onclick="triggerPhotoUpload()">
          <span>Escolher foto</span> da galeria<br>
          <span style="color:#BBB;font-weight:400">JPG, PNG ou HEIC</span>
        </label>
      </div>
      ${[["👤 Nome","name","Nome completo"],["🏢 Empresa","company","Empresa ou profissão"],
         ["🏙 Cidade","city","Ex: São Paulo, SP"],["📱 Telefone","phone","+55 11 9 9999-9999"],
         ["🌐 Site","site","https://..."],["📧 Email","email","email@exemplo.com"]
        ].map(([l,f,p])=>`
        <div class="contact-field">
          <span class="contact-field-label">${l}</span>
          <input class="contact-field-input" placeholder="${p}" value="${esc(cf[f]||"")}"
            oninput="setCF('${f}',this.value)">
        </div>`).join("")}
      <div class="contact-field">
        <span class="contact-field-label">📂 Seção</span>
        <select class="contact-field-select" onchange="setCF('section',this.value)">
          ${CONTACT_SECS.map(s=>`<option value="${s}"${s===cf.section?" selected":""}>${s}</option>`).join("")}
        </select>
      </div>
      <div class="contact-form-actions">
        <button class="contact-save-btn" onclick="saveContact()">Salvar contato</button>
        <button class="contact-cancel-btn" onclick="toggleContactForm()">Cancelar</button>
      </div>
    </div>`:""}
    <input id="contacts-search" class="contacts-search" placeholder="🔍 Buscar nome, empresa ou cidade..."
      oninput="filterContacts(this.value)">
    <div id="contacts-list">${buildContactsList()}</div>`;

// ── ACTIONS ────────────────────────────────────────────────────────
// Text fields that should NOT trigger render while typing
const NO_RENDER_KEYS = new Set(["input","address","notes","contactSearch","travelName"]);
window.S = function(key, val) {
  state[key] = val;
  if (NO_RENDER_KEYS.has(key)) return;
  render();
};
window.setGroup = function(id) {
  // Save travel name from DOM before switching tabs
  const tn = document.getElementById("travel-name-input");
  if (tn) state.travelName = tn.value.trim();
  state.activeGroup=id; state.selectedHouse=null; render();
};

window.addTask = async function() {
  const mainInput    = document.getElementById("main-input");
  const addressInput = document.getElementById("address-input");
  const notesInput   = document.getElementById("notes-input");
  const travelInput  = document.getElementById("travel-name-input");
  const text = mainInput ? mainInput.value.trim() : "";
  if (!text) return;
  const address    = addressInput ? addressInput.value.trim() : "";
  const notes      = notesInput   ? notesInput.value.trim()   : "";
  const travelName = travelInput  ? travelInput.value.trim()  : state.travelName;
  if (travelInput) state.travelName = travelName;
  const task = {
    id: Date.now() * 1000 + Math.floor(Math.random() * 1000),
    text, group: state.activeGroup, assignee: state.assignee,
    done: false, dueDate: state.dueDate||null, dueTime: state.dueTime||null,
    address: address||null, notes: notes||null,
    house: (state.activeGroup==="casa"||state.activeGroup==="compras") ? state.selectedHouse : null,
    createdAt: new Date().toLocaleDateString("pt-BR"),
    ...(state.activeGroup==="viagens"&&{travelName:travelName||"Próxima viagem",travelCategory:state.travelCategory}),
    ...(state.activeGroup==="saude"&&{healthCategory:state.healthCategory}),
  };
  state.dueDate=""; state.dueTime="";
  render();
  await fbSaveTask(task);
  setTimeout(()=>{ const el=document.getElementById("main-input"); if(el){ el.value=""; el.focus(); } },50);
};

window.toggleTask = async function(id) {
  const task = state.tasks.find(t=>t.id===id);
  if (!task) return;
  await fbUpdateTask(id, { done: !task.done });
};

window.deleteTask = async function(id) {
  if (!confirm("Remover esta tarefa?")) return;
  await fbDeleteTask(id);
};

window.startEditNote = function(id) {
  state.editingNotes[id]=true;
  state.notesVal[id]=state.tasks.find(t=>t.id===id)?.notes||"";
  render();
};
window.setNoteVal = function(id,val) { state.notesVal[id]=val; };
window.saveNote = async function(id) {
  const notes = state.notesVal[id]?.trim()||null;
  delete state.editingNotes[id];
  render();
  await fbUpdateTask(id, { notes });
};
window.cancelNote = function(id) { delete state.editingNotes[id]; render(); };

window.onDueDateChange = function(val) {
  state.dueDate = val;
  // Enable/disable time input without re-rendering
  const timeEl = document.getElementById("due-time-input");
  if (timeEl) timeEl.disabled = !val;
  // Show/hide calendar toggle without re-rendering
  const wrap = document.getElementById("cal-toggle-wrap");
  if (wrap) {
    wrap.innerHTML = val ? `<label class="cal-toggle">
      <input type="checkbox" ${state.addToCalendar?"checked":""} onchange="state.addToCalendar=this.checked">
      Adicionar à agenda
    </label>` : "";
  }
  if (!val) { state.dueTime = ""; const t = document.getElementById("due-time-input"); if(t) t.value = ""; }
};

window.filterContacts = function(val) {
  state.contactSearch = val;
  // Re-render only the contacts list section, not the whole page
  const listEl = document.getElementById("contacts-list");
  if (listEl) listEl.innerHTML = buildContactsList();
};

function buildContactsList() {
  const filtered = state.contacts.filter(c =>
    !state.contactSearch ||
    c.name.toLowerCase().includes(state.contactSearch.toLowerCase()) ||
    (c.company||"").toLowerCase().includes(state.contactSearch.toLowerCase()) ||
    (c.city||"").toLowerCase().includes(state.contactSearch.toLowerCase())
  );
  const grouped = {};
  filtered.forEach(c => { const s=c.section||"Outros"; if(!grouped[s])grouped[s]=[]; grouped[s].push(c); });
  const sorted = [...CONTACT_SECS.filter(s=>grouped[s]),...Object.keys(grouped).filter(s=>!CONTACT_SECS.includes(s))];
  if (!sorted.length) return `<div class="empty"><div class="empty-icon">👥</div><div>Nenhum contato ainda.</div></div>`;
  return sorted.map(sec=>`
    <div class="contacts-section-label">${sec}</div>
    ${grouped[sec].map(c=>`
      <div class="contact-card">
        ${c.photo?`<img src="${c.photo}" class="contact-avatar" alt="${esc(c.name)}">`:
          `<div class="contact-avatar-placeholder">👤</div>`}
        <div class="contact-info">
          <div class="contact-name">${esc(c.name)}</div>
          ${c.company||c.city?`<div class="contact-company">${esc(c.company||"")}${c.company&&c.city?" · ":""}${esc(c.city||"")}</div>`:""}
          <div class="contact-links">
            ${c.phone?`<a href="tel:${esc(c.phone)}" class="contact-link">📱 ${esc(c.phone)}</a>`:""}
            ${c.email?`<a href="mailto:${esc(c.email)}" class="contact-link">📧 ${esc(c.email)}</a>`:""}
            ${c.site?`<a href="${esc(c.site.startsWith('http')?c.site:'https://'+c.site)}" target="_blank" class="contact-link">🌐 Site</a>`:""}
          </div>
        </div>
        <button class="contact-delete-btn" onclick="deleteContact(${c.id})">✕</button>
      </div>`).join("")}`).join("");
}

window.toggleContactForm = function() { state.showContactForm=!state.showContactForm; state.contactSearch=""; render(); };
window.setCF = function(f,v) { state.cf[f]=v; };
window.triggerPhotoUpload = function() { document.getElementById("photo-input")?.click(); };
window.handlePhotoUpload = function(input) {
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{ state.cf.photo=e.target.result; render(); };
  reader.readAsDataURL(file);
};
window.saveContact = async function() {
  if (!state.cf.name.trim()) { alert("Nome é obrigatório"); return; }
  const contact = { ...state.cf, id: Date.now() * 1000 + Math.floor(Math.random() * 1000) };
  state.cf={ photo:null,name:"",company:"",section:"Outros",city:"",phone:"",site:"",email:"" };
  state.showContactForm=false;
  render();
  await fbSaveContact(contact);
};
window.deleteContact = async function(id) {
  if (!confirm("Remover este contato?")) return;
  await fbDeleteContact(id);
};

// ── FDS ────────────────────────────────────────────────────────────
function generateWeekends() {
  // Dados exatos da tabela — [key, fri, sat, sun, joaDefault, isaDefault, event]
  const DATA = [

function buildFDS() {
  const today = new Date().toISOString().split("T")[0];
  const allWeeks = generateWeekends();
  const pastCount = allWeeks.filter(w => w.sunKey < today).length;
  const weeks = state.hidePast ? allWeeks.filter(w => w.sunKey >= today) : allWeeks;

  const buildTable = (title, emoji, whoKey, opts, greenVal) => {
    const rows = weeks.map(w => {
      const saved = state.fds[w.key] || {};
      const who = saved[whoKey] !== undefined ? saved[whoKey] : (whoKey==="isa_who" ? w.isaDefault : w.joaDefault);
      const event = saved.event !== undefined ? saved.event : w.event;
      const green = who === greenVal;
      const rc = green ? "fds-row-green" : "fds-row-white";
      const selStyle = green ? ' style="color:#fff"' : '';
      return '<tr class="'+rc+'">'
        + '<td><select class="fds-who-select" onchange="saveFdsWho(\''+w.key+'\',\''+whoKey+'\',this.value)"'+selStyle+'>'
        + opts.map(o => '<option value="'+o+'"'+(o===who?' selected':'')+'>'+o+'</option>').join('')
        + '</select></td>'
        + '<td>'+w.fri+'</td><td>'+w.sat+'</td><td>'+w.sun+'</td>'
        + '</tr>'
        + '<tr class="fds-obs-row"><td colspan="4"><div class="fds-obs-inner">'
        + '<textarea class="fds-event-input" rows="1" placeholder="★ Adicionar evento..." onblur="saveFdsEvent(\''+w.key+'\',this.value)" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();this.blur()}">'+esc(event)+'</textarea>'
        + '</div></td></tr>';
    }).join('');
    return '<div class="fds-col">'
      + '<div class="fds-block-title">'+emoji+' '+title+'</div>'
      + '<div class="fds-block"><div class="fds-wrapper"><table class="fds-table">'
      + '<thead><tr><th>Quem</th><th>Sex</th><th>Sab</th><th>Dom</th></tr></thead>'
      + '<tbody>'+rows+'</tbody></table></div></div></div>';
  };

  const toggleLabel = state.hidePast
    ? '👁 Ver passados ('+pastCount+')'
    : '🙈 Ocultar passados';

  return '<div>'
    + '<div style="display:flex;justify-content:flex-end;margin-bottom:12px">'
    + '<button onclick="toggleHidePast()" style="background:#1C1C1E;color:#F5F0E8;border:none;border-radius:20px;padding:7px 16px;font-family:DM Sans,sans-serif;font-size:12px;font-weight:500;cursor:pointer">'
    + toggleLabel+'</button></div>'
    + '<div class="fds-outer">'
    + buildTable("Isabelle","👧","isa_who",["Daniel","Daiana"],"Daniel")
    + buildTable("Joaquim","👦","joa_who",["Natalia","Itamar"],"Natalia")
    + '</div></div>';
}

window.saveFdsWho = async function(weekKey, field, val) {
  const cur = state.fds[weekKey] || {};
  const upd = Object.assign({}, cur, {[field]: val});
  state.fds[weekKey] = upd;
  render();
  await fbSaveFds(weekKey, upd);
};

window.toggleHidePast = function() { state.hidePast = !state.hidePast; render(); };

window.saveFdsEvent = async function(weekKey, val) {
  const cur = state.fds[weekKey] || {};
  const upd = Object.assign({}, cur, {event: val.trim()});
  state.fds[weekKey] = upd;
  await fbSaveFds(weekKey, upd);
};

function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
