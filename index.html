<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Concierge">
<title>Concierge Familiar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root { --gc: #E8A87C; }
body { background: #F5F0E8; font-family: 'DM Sans', sans-serif; overscroll-behavior: none; }
#app { min-height: 100vh; background: #F5F0E8; padding: 0 0 80px; }
.header { background: #1C1C1E; padding: 20px 20px 0; padding-top: max(env(safe-area-inset-top,16px), 28px); }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.header-title { font-family: 'Playfair Display', serif; color: #F5F0E8; font-size: 24px; font-weight: 700; line-height: 1.2; }
.header-sub { color: #888; font-size: 12px; margin-top: 3px; }
.sync-badge { font-size: 11px; padding: 5px 10px; border-radius: 20px; font-weight: 500; border: 1px solid #3C3C3E; white-space: nowrap; background: #2C2C2E; color: #85C1A3; }
.sync-badge.syncing { color: #F7D070; }
.sync-badge.offline { color: #C07070; }
.groups-nav { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; padding-bottom: 0; }
.groups-nav::-webkit-scrollbar { display: none; }
.group-tab { flex-shrink: 0; padding: 9px 14px; border-radius: 12px 12px 0 0; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; background: #2C2C2E; color: #888; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
.group-tab.active { color: #1C1C1E; font-weight: 700; }
.content { padding: 20px 16px; }
.sync-note { background: #1C1C1E; border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.sync-note-text { font-size: 12px; color: #888; line-height: 1.5; }
.sync-note-text strong { color: #F5F0E8; }
.stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
.stat-card { flex: 1; background: #fff; border-radius: 14px; padding: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); text-align: center; }
.stat-num { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--gc); }
.stat-lbl { font-size: 11px; color: #AAA; font-weight: 500; margin-top: 2px; }
.house-selector { background: #fff; border-radius: 16px; padding: 14px 16px; margin-bottom: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
.house-selector-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #AAA; text-transform: uppercase; margin-bottom: 10px; }
.house-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.house-btn { padding: 7px 14px; border-radius: 20px; border: 1.5px solid #E8E0D8; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; color: #888; transition: all 0.2s; }
.house-btn.active { background: var(--gc); border-color: var(--gc); color: #1C1C1E; font-weight: 700; }
.travel-header { background: linear-gradient(135deg, #2C2050 0%, #1C1C1E 100%); border-radius: 18px; padding: 16px 18px; margin-bottom: 16px; border: 1px solid #3D3560; }
.travel-header-title { font-family: 'Playfair Display', serif; color: #B5A8D8; font-size: 16px; font-weight: 700; margin-bottom: 10px; }
.travel-name-input { width: 100%; background: #1C1C1E; border: 1.5px solid #3D3560; border-radius: 10px; padding: 9px 14px; color: #F5F0E8; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; margin-bottom: 10px; }
.travel-cats, .health-cats { display: flex; flex-wrap: wrap; gap: 6px; }
.travel-cat-btn, .health-cat-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid #3D3560; background: transparent; color: #888; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; }
.travel-cat-btn.active { background: #B5A8D8; border-color: #B5A8D8; color: #1C1C1E; font-weight: 600; }
.health-header { background: linear-gradient(135deg, #0D3030 0%, #1C1C1E 100%); border-radius: 18px; padding: 16px 18px; margin-bottom: 16px; border: 1px solid #1E5050; }
.health-header-title { color: #7EC8C8; font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.health-cat-btn.active { background: #7EC8C8; border-color: #7EC8C8; color: #0D2020; font-weight: 600; }
.add-section { background: #fff; border-radius: 18px; padding: 16px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.add-row { display: flex; gap: 8px; align-items: center; }
.add-input { flex: 1; border: 1.5px solid #E8E0D8; border-radius: 12px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: #FAFAF8; outline: none; color: #1C1C1E; }
.add-input:focus { border-color: var(--gc); }
.add-input::placeholder { color: #BBBBB0; }
.add-btn { width: 44px; height: 44px; border-radius: 13px; border: none; background: var(--gc); color: #1C1C1E; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s; }
.add-btn:active { transform: scale(0.92); }
.assignee-row, .due-date-row, .address-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.assignee-label, .due-date-label, .address-label { font-size: 12px; color: #999; font-weight: 500; white-space: nowrap; }
.assignee-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid #E8E0D8; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; color: #666; transition: all 0.2s; }
.assignee-btn.active { background: var(--gc); border-color: var(--gc); color: #1C1C1E; font-weight: 600; }
.due-date-input { border: 1.5px solid #E8E0D8; border-radius: 10px; padding: 7px 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: #FAFAF8; outline: none; color: #555; flex: 1; }
.due-date-input:focus { border-color: var(--gc); }
.time-input { width: 110px; flex: none !important; }
.cal-toggle { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 12px; color: #999; cursor: pointer; }
.cal-toggle input { accent-color: var(--gc); }
.address-input { flex: 1; border: 1.5px solid #E8E0D8; border-radius: 10px; padding: 7px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: #FAFAF8; outline: none; color: #555; }
.address-input:focus { border-color: var(--gc); }
.notes-row { margin-top: 10px; }
.notes-input { width: 100%; border: 1.5px solid #E8E0D8; border-radius: 10px; padding: 8px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: #FAFAF8; outline: none; resize: none; color: #555; min-height: 60px; }
.notes-input:focus { border-color: var(--gc); }
.notes-input::placeholder { color: #BBBBB0; }
.section-label { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; color: #AAA; text-transform: uppercase; margin-bottom: 8px; margin-top: 4px; }
.task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.task-card { background: #fff; border-radius: 14px; padding: 14px; display: flex; flex-direction: column; align-items: stretch; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
.task-card.done { opacity: 0.5; }
.task-row { display: flex; align-items: center; gap: 10px; }
.check-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--gc); background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.2s; font-size: 12px; color: #1C1C1E; }
.check-btn.done { background: var(--gc); }
.task-body { flex: 1; min-width: 0; }
.task-text { font-size: 14px; color: #1C1C1E; font-weight: 400; line-height: 1.4; }
.task-text.done { text-decoration: line-through; color: #AAA; }
.task-meta { font-size: 11px; color: #BBBBB0; margin-top: 4px; display: flex; gap: 6px; flex-wrap: wrap; }
.meta-tag { background: #F5F0E8; border-radius: 6px; padding: 1px 7px; font-weight: 500; }
.due-tag { border-radius: 6px; padding: 1px 7px; font-weight: 500; font-size: 11px; background: #FFF0E8; color: #C07040; }
.due-tag.overdue { background: #FFE8E8; color: #C04040; }
.due-tag.done-tag { background: #E8F5EE; color: #3A9060; }
.house-tag { font-size: 11px; border-radius: 6px; padding: 1px 7px; font-weight: 600; background: #F5F0E8; color: #888; }
.delete-btn { background: none; border: none; color: #D0C8C0; cursor: pointer; font-size: 16px; padding: 4px; flex-shrink: 0; }
.task-address { margin-top: 6px; }
.map-link { font-size: 12px; color: #4A90D9; text-decoration: none; background: #EEF4FC; border-radius: 6px; padding: 3px 10px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
.task-notes { margin-top: 6px; font-size: 12px; color: #888; line-height: 1.5; background: #F9F7F4; border-radius: 8px; padding: 7px 10px; border-left: 3px solid var(--gc); cursor: pointer; }
.task-notes-label { font-size: 10px; color: #AAA; display: block; margin-bottom: 2px; }
.add-note-btn { background: none; border: none; font-size: 12px; color: #BBBBB0; cursor: pointer; margin-top: 4px; padding: 2px 0; }
.notes-edit-input { width: 100%; border: 1.5px solid var(--gc); border-radius: 8px; padding: 6px 10px; font-family: 'DM Sans', sans-serif; font-size: 12px; background: #FAFAF8; outline: none; resize: none; color: #444; min-height: 50px; margin-top: 6px; }
.note-actions { display: flex; gap: 8px; margin-top: 6px; }
.note-save { flex: 1; padding: 6px; border-radius: 8px; border: none; background: var(--gc); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; }
.note-cancel { padding: 6px 12px; border-radius: 8px; border: 1.5px solid #E8E0D8; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; color: #888; }
.empty { text-align: center; padding: 32px 20px; color: #C0B8B0; font-size: 14px; }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.travel-group-section { margin-bottom: 20px; }
.travel-trip-title { font-family: 'Playfair Display', serif; color: #B5A8D8; font-size: 15px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #2C2050; }
.travel-group-label, .health-group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; color: #B5A8D8; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.health-group-label { color: #7EC8C8; }
.travel-trip-name { font-size: 11px; background: #2C2050; color: #B5A8D8; border-radius: 6px; padding: 2px 8px; font-weight: 500; }
.health-count-tag { font-size: 11px; background: #0D3030; color: #7EC8C8; border-radius: 6px; padding: 2px 8px; font-weight: 500; }
.contacts-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.contacts-title { font-family: 'Playfair Display', serif; font-size: 18px; color: #1C1C1E; font-weight: 700; }
.new-contact-btn { background: var(--gc); border: none; border-radius: 12px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; color: #1C1C1E; }
.contact-form { background: #fff; border-radius: 18px; padding: 18px; margin-bottom: 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.contact-form-title { font-size: 14px; font-weight: 600; color: #1C1C1E; margin-bottom: 14px; }
.contact-photo-upload { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.photo-preview, .photo-placeholder { width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--gc); }
.photo-preview { object-fit: cover; cursor: pointer; }
.photo-placeholder { background: #F5F0E8; border-style: dashed; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
.photo-label { font-size: 12px; color: #999; cursor: pointer; }
.photo-label span { color: var(--gc); font-weight: 600; text-decoration: underline; }
.contact-field { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.contact-field-label { font-size: 12px; color: #999; width: 72px; flex-shrink: 0; font-weight: 500; }
.contact-field-input, .contact-field-select { flex: 1; border: 1.5px solid #E8E0D8; border-radius: 10px; padding: 8px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; background: #FAFAF8; outline: none; color: #1C1C1E; }
.contact-field-input:focus, .contact-field-select:focus { border-color: var(--gc); }
.contact-form-actions { display: flex; gap: 8px; margin-top: 14px; }
.contact-save-btn { flex: 1; background: var(--gc); border: none; border-radius: 12px; padding: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; color: #1C1C1E; }
.contact-cancel-btn { padding: 10px 16px; border-radius: 12px; border: 1.5px solid #E8E0D8; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; color: #888; }
.contacts-search { width: 100%; border: 1.5px solid #E8E0D8; border-radius: 12px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: #fff; outline: none; margin-bottom: 16px; color: #1C1C1E; }
.contacts-search:focus { border-color: var(--gc); }
.contacts-section-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #C8A87E; text-transform: uppercase; margin: 14px 0 8px; }
.contact-card { background: #fff; border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); margin-bottom: 8px; }
.contact-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--gc); }
.contact-avatar-placeholder { width: 48px; height: 48px; border-radius: 50%; background: #F5F0E8; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; border: 2px solid var(--gc); }
.contact-info { flex: 1; min-width: 0; }
.contact-name { font-size: 15px; font-weight: 600; color: #1C1C1E; }
.contact-company { font-size: 12px; color: #888; margin-top: 1px; }
.contact-links { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.contact-link { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #F5F0E8; color: #666; text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }
.contact-delete-btn { background: none; border: none; color: #D0C8C0; cursor: pointer; font-size: 15px; padding: 4px; align-self: flex-start; }

/* FDS */
.fds-outer { display: flex; gap: 16px; align-items: flex-start; }
.fds-col { flex: 1; min-width: 0; }
.fds-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.fds-block-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: #1C1C1E; margin: 0 0 8px; text-align: center; }
.fds-block { background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 24px; }
.fds-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.fds-table th { background: #1C1C1E; color: #F5F0E8; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; padding: 8px 4px; text-align: center; }
.fds-table th:first-child { text-align: left; padding-left: 8px; }
.fds-row-green td { background: #4CAF50; color: #fff; font-weight: 600; }
.fds-row-white td { background: #fff; color: #1C1C1E; }
.fds-table td { padding: 6px 4px; text-align: center; border-bottom: 1px solid #F0EDE8; font-size: 11px; }
.fds-table td:first-child { text-align: left; padding-left: 8px; }
.fds-who-select { background: transparent; border: none; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; outline: none; max-width: 72px; }
.fds-row-green .fds-who-select { color: #fff; }
.fds-row-green .fds-who-select option { color: #1C1C1E; background: #fff; }
.fds-obs-row td { padding: 3px 8px 7px !important; background: #F9F7F4 !important; border-bottom: 2px solid #E8E0D8 !important; }
.fds-obs-inner { display: flex; flex-direction: column; gap: 4px; }
.fds-obs-input { width: 100%; border: 1.5px solid #E8E0D8; border-radius: 8px; padding: 4px 8px; font-family: 'DM Sans', sans-serif; font-size: 11px; background: #fff; outline: none; color: #555; resize: none; }
.fds-obs-input:focus { border-color: #7BBF8E; }
.fds-obs-input::placeholder { color: #BBBBB0; }
.fds-event-input { width: 100%; border: 1.5px solid #FFD0A0; border-radius: 6px; padding: 3px 7px; font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 700; background: #FFF5EC; outline: none; color: #E65C00; resize: none; }
.fds-event-input:focus { border-color: #E65C00; }
.fds-event-input::placeholder { color: #FFBB88; font-weight: 400; }
.fds-event-label { font-size: 9px; color: #E65C00; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; }
.loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-size: 14px; color: #888; flex-direction: column; gap: 12px; background: #F5F0E8; }
.loading-spinner { width: 32px; height: 32px; border: 3px solid #E8E0D8; border-top-color: #E8A87C; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.task-card, .contact-card { animation: slideIn 0.2s ease; }

/* ── Date/time inline editor ── */
.date-edit-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-top:8px; padding:8px 10px; background:#F9F7F4; border-radius:10px; border:1.5px solid var(--gc); }
.date-edit-input { border:1.5px solid #E8E0D8; border-radius:8px; padding:5px 8px; font-family:'DM Sans',sans-serif; font-size:12px; background:#fff; outline:none; color:#444; }
.date-edit-input:focus { border-color:var(--gc); }
.date-edit-save { padding:5px 12px; border-radius:8px; border:none; background:var(--gc); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; color:#1C1C1E; }
.date-edit-clear { padding:5px 10px; border-radius:8px; border:1.5px solid #FFE0E0; background:#FFF5F5; font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; color:#C07070; }
.date-edit-cancel { padding:5px 10px; border-radius:8px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; color:#888; }
.add-due-btn { background:none; border:none; font-size:12px; color:#BBBBB0; cursor:pointer; margin-top:4px; padding:2px 0; display:inline-block; }
.due-tag-clickable { cursor:pointer; }
.due-tag-clickable:hover { opacity:0.75; }

/* Data de início da viagem no header */
.travel-date-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.travel-date-label { font-size:11px; color:#B5A8D8; font-weight:600; white-space:nowrap; }
.travel-date-input { background:#1C1C1E; border:1.5px solid #3D3560; border-radius:8px; padding:6px 10px; color:#F5F0E8; font-family:'DM Sans',sans-serif; font-size:12px; outline:none; flex:1; }
.travel-date-input:focus { border-color:#B5A8D8; }
.travel-trip-date { font-size:11px; color:#9B90C8; font-weight:500; margin-left:4px; }
.travel-trip-future { color:#85C1A3; }
.travel-trip-past { color:#888; }
.travel-trip-today { color:#F7D070; }

/* Edição inline do Para: na task card */
.assignee-edit-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-top:8px; padding:7px 10px; background:#F9F7F4; border-radius:10px; border:1.5px solid var(--gc); }
.assignee-edit-label { font-size:11px; color:#999; font-weight:600; white-space:nowrap; }
.assignee-edit-btn { padding:4px 10px; border-radius:16px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer; color:#666; transition:all 0.15s; }
.assignee-edit-btn.active { background:var(--gc); border-color:var(--gc); color:#1C1C1E; font-weight:700; }
.assignee-edit-save { padding:4px 12px; border-radius:16px; border:none; background:var(--gc); font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; cursor:pointer; color:#1C1C1E; }
.meta-tag-clickable { cursor:pointer; text-decoration:underline dotted; }

/* Edição inline de contato existente */
.contact-edit-form { background:#FAFAF8; border-radius:14px; padding:14px; margin-top:8px; border:1.5px solid var(--gc); }
.contact-edit-actions { display:flex; gap:8px; margin-top:10px; }
.contact-edit-save { flex:1; background:var(--gc); border:none; border-radius:10px; padding:8px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; cursor:pointer; color:#1C1C1E; }
.contact-edit-cancel { padding:8px 14px; border-radius:10px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; color:#888; }

.imovel-cancel-btn { padding:10px 16px; border-radius:12px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; color:#888; }
.imovel-group-label { font-size:11px; font-weight:700; letter-spacing:1px; color:#D4A57A; text-transform:uppercase; margin:16px 0 8px; display:flex; align-items:center; gap:6px; }
.imovel-group-count { font-size:11px; background:#FDF0E8; color:#C8824A; border-radius:6px; padding:2px 8px; font-weight:500; }
.imovel-card { background:#fff; border-radius:16px; padding:16px; margin-bottom:10px; box-shadow:0 1px 6px rgba(0,0,0,0.06); }

.imovel-card-nome { font-size:15px; font-weight:700; color:#1C1C1E; }
.imovel-card-loc { font-size:12px; color:#888; margin-top:2px; }
.imovel-card-badges { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
.imovel-badge { font-size:11px; border-radius:6px; padding:2px 8px; font-weight:600; }
.imovel-badge-tipo { background:#FDF0E8; color:#C8824A; }
.imovel-badge-status { background:#E8F5EE; color:#3A9060; }
.imovel-badge-status.locado { background:#EEF4FC; color:#4A80D9; }
.imovel-badge-status.construcao { background:#FFF8E8; color:#C09030; }
.imovel-badge-status.venda { background:#FFE8E8; color:#C04040; }
.imovel-badge-status.vendido { background:#F0E8FF; color:#7040C0; }

.imovel-card-valores { display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; }
.imovel-valor-item { font-size:12px; color:#666; }
.imovel-valor-label { font-size:10px; color:#AAA; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:1px; }
.imovel-edit-btn { background:none; border:none; font-size:15px; cursor:pointer; color:#C8A87E; padding:2px; flex-shrink:0; }

/* ── Imóveis: painel de resumo ── */
.imovel-resumo { background:linear-gradient(135deg,#2A1F10 0%,#1C1C1E 100%); border-radius:18px; padding:16px 18px; margin-bottom:18px; border:1px solid #5A3A1A; }

/* ── Imóveis: contratos ── */

.imovel-contratos-title { font-size:11px; font-weight:700; letter-spacing:0.8px; color:#C8A87E; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
.add-contrato-btn { background:var(--gc); border:none; border-radius:8px; padding:3px 10px; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; cursor:pointer; color:#1C1C1E; }
.contrato-form { background:#F9F7F4; border-radius:10px; padding:10px; margin-bottom:8px; border:1.5px solid var(--gc); }
.contrato-field { display:flex; align-items:center; gap:6px; margin-bottom:7px; }
.contrato-field-label { font-size:11px; color:#999; width:72px; flex-shrink:0; font-weight:500; }
.contrato-field-input, .contrato-field-select { flex:1; border:1.5px solid #E8E0D8; border-radius:8px; padding:6px 10px; font-family:'DM Sans',sans-serif; font-size:12px; background:#fff; outline:none; color:#1C1C1E; }

.contrato-form-actions { display:flex; gap:6px; margin-top:8px; }
.contrato-save-btn { flex:1; background:var(--gc); border:none; border-radius:8px; padding:7px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; cursor:pointer; color:#1C1C1E; }
.contrato-cancel-btn { padding:7px 12px; border-radius:8px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; color:#888; }
.contrato-card { background:#F9F7F4; border-radius:10px; padding:10px 12px; margin-bottom:6px; display:flex; align-items:flex-start; gap:8px; border:1px solid #EDE8E0; }
.contrato-card-body { flex:1; min-width:0; }
.contrato-card-nome { font-size:13px; font-weight:600; color:#1C1C1E; }
.contrato-card-meta { font-size:11px; color:#999; margin-top:3px; display:flex; gap:8px; flex-wrap:wrap; }
.contrato-card-link { font-size:11px; color:#4A90D9; text-decoration:none; background:#EEF4FC; border-radius:5px; padding:1px 7px; }
.contrato-card-edit { margin-top:4px; }
.contrato-edit-form { background:#fff; border-radius:8px; padding:8px 10px; margin-top:6px; border:1.5px solid var(--gc); }
.contrato-del-btn { background:none; border:none; color:#D0C8C0; cursor:pointer; font-size:14px; padding:2px; flex-shrink:0; }
.contrato-edit-btn { background:none; border:none; color:#C8A87E; cursor:pointer; font-size:13px; padding:2px; }

/* ── Upload PDF contrato ── */
.contrato-pdf-upload { margin-bottom:7px; }
.contrato-pdf-label { font-size:11px; color:#999; font-weight:500; margin-bottom:4px; display:block; }
.contrato-pdf-btn { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:8px; border:1.5px dashed #E8E0D8; background:#FAFAF8; font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer; color:#888; transition:all 0.2s; }
.contrato-pdf-btn:hover { border-color:var(--gc); color:var(--gc); }
.contrato-pdf-name { font-size:11px; color:#4A90D9; margin-top:3px; word-break:break-all; }
.contrato-pdf-link { font-size:11px; color:#4A90D9; text-decoration:none; background:#EEF4FC; border-radius:5px; padding:2px 8px; display:inline-flex; align-items:center; gap:3px; margin-top:3px; }
.contrato-pdf-remove { background:none; border:none; color:#C07070; font-size:11px; cursor:pointer; margin-left:4px; }

/* Edição inline do texto da tarefa */
.task-text-edit { width:100%; border:1.5px solid var(--gc); border-radius:8px; padding:5px 8px; font-family:'DM Sans',sans-serif; font-size:14px; background:#FAFAF8; outline:none; color:#1C1C1E; }
.task-text-actions { display:flex; gap:6px; margin-top:4px; }
.task-text-save { padding:4px 12px; border-radius:8px; border:none; background:var(--gc); font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; cursor:pointer; color:#1C1C1E; }
.task-text-cancel { padding:4px 10px; border-radius:8px; border:1.5px solid #E8E0D8; background:transparent; font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer; color:#888; }
</style>
</head>
<body>
<div id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div>Conectando...</div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── FIREBASE CONFIG ────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAx95UFNGaNFe-SGgFnZFcx-3TDFH_U92o",
  authDomain: "familia-app-5cd84.firebaseapp.com",
  databaseURL: "https://familia-app-5cd84-default-rtdb.firebaseio.com",
  projectId: "familia-app-5cd84",
  storageBucket: "familia-app-5cd84.firebasestorage.app",
  messagingSenderId: "419411824094",
  appId: "1:419411824094:web:3f84321668c3aab892214f",
  measurementId: "G-9VET0V5QGQ"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── CONSTANTS ──────────────────────────────────────────────────────
const GROUPS = [
  { id: "casa",        label: "Casa",        emoji: "🏠", color: "#E8A87C" },
  { id: "compras",     label: "Compras",     emoji: "🛒", color: "#85C1A3" },
  { id: "dejulie",     label: "Dejulie",     emoji: "💛", color: "#F7D070" },
  { id: "viladejulie", label: "Vila Dejulie",emoji: "🏡", color: "#F0A8C0" },
  { id: "saude",       label: "Saúde",       emoji: "🏥", color: "#7EC8C8" },
  { id: "viagens",     label: "Viagens",     emoji: "✈️", color: "#B5A8D8" },
  { id: "contatos",    label: "Contatos",    emoji: "👥", color: "#C8A87E" },
  { id: "imoveis",     label: "Imóveis",     emoji: "🏘", color: "#D4A57A" },
  { id: "fds",         label: "FDS",         emoji: "📅", color: "#7BBF8E" },
  { id: "outros",      label: "Outros",      emoji: "🎯", color: "#A8B8D8" },
];
const HOUSES = [
  { id: "itaim",     label: "Itaim",     emoji: "🏙" },
  { id: "itanhaem",  label: "Itanhaém",  emoji: "🏖" },
  { id: "jacuma",    label: "Jacumã",    emoji: "🌴" },
];
const HEALTH_CATS   = ["Remédio","Exame","Médico","Dentista","Outros"];
const HEALTH_EMOJIS = {"Remédio":"💊","Exame":"🔬","Médico":"👨‍⚕️","Dentista":"🦷","Outros":"🏥"};
const TRAVEL_CATS   = ["Aéreo","Documentos","Hospedagem","Transporte","Passeios","Bagagem","Saúde","Outros"];
const CONTACT_SECS  = ["Viagens","Dejulie","Vila Dejulie","Serviço","Outros"];
const SHOPPING_CATS = ["Mercado","Roupa","Comemoração","Remédio","Suplemento","Outros"];
const SHOPPING_EMOJIS = {"Mercado":"🛒","Roupa":"👕","Comemoração":"🎉","Remédio":"💊","Suplemento":"💪","Outros":"📦"};
const ASSIGNEES     = ["Daniel","Natalia","Casal","Joaquim","Isabelle","Família"];
const IMOVEL_TIPOS   = ["Casa","Apartamento","Lote","Comercial","Loja","Outros"];
const IMOVEL_STATUS  = ["Próprio","Locado","Em construção","À venda","Vendido"];
const IMOVEL_GRUPOS  = ["Casa","Apartamento","Lote","Comercial","Loja","Outros"];
const IMOVEL_GRUPO_EMOJIS = {"Casa":"🏠","Apartamento":"🏢","Lote":"🌿","Comercial":"🏪","Loja":"🏬","Outros":"🏘"};

// ── STATE ──────────────────────────────────────────────────────────
let state = {
  activeGroup: "casa", tasks: [], contacts: [],
  assignee: "Daniel",
  dueDate: "", dueTime: "", addToCalendar: false,
  travelName: "", travelDate: "", travelCategory: "Documentos",
  shoppingCategory: "Mercado",
  healthCategory: "Médico", selectedHouse: null,
  showContactForm: false, contactSearch: "", editingContactId: null,
  cf: { photo:null, name:"", company:"", section:"Outros", city:"", phone:"", site:"", email:"" },
  editingNotes: {}, notesVal: {}, editingAssignee: {}, editingText: {}, textVal: {},
  editingDateTime: {},  // tracks which task has date/time editor open
  _dtEdit: {},           // temp date/time values while editing
  syncStatus: "syncing",
  imoveis: [], editingImovelId: null, showImovelForm: false,
  showContratoForm: {},   // imovelId -> bool
  editingContratoId: {},  // imovelId -> contratoId
  _contratoSnap: {},      // temp contrato fields while editing

  fds: {},
  hidePast: true,
};

// ── FIREBASE SYNC ──────────────────────────────────────────────────
// Listen for real-time updates
onValue(ref(db, "tasks"), snap => {
  const data = snap.val();
  state.tasks = data ? Object.values(data).sort((a,b) => b.id - a.id) : [];
  state.syncStatus = "online";
  safeRender();
}, err => { state.syncStatus = "offline"; safeRender(); });

onValue(ref(db, "contacts"), snap => {
  const data = snap.val();
  state.contacts = data ? Object.values(data).sort((a,b) => b.id - a.id) : [];
  safeRender();
});

onValue(ref(db, "imoveis"), snap => {
  const data = snap.val();
  state.imoveis = data ? Object.values(data).sort((a,b)=> (a.nome||"").localeCompare(b.nome||"")) : [];
  safeRender();
});

async function fbSaveImovel(im) {
  setSyncStatus("syncing");
  try { await set(ref(db, `imoveis/${im.id}`), im); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbSaveImovel:", e); }
}
async function fbDeleteImovel(id) {
  setSyncStatus("syncing");
  try { await remove(ref(db, `imoveis/${id}`)); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbDeleteImovel:", e); }
}

onValue(ref(db, "fds"), snap => {
  state.fds = snap.val() || {};
  const active = document.activeElement;
  if (active && active.classList.contains("fds-event-input")) return;
  render();
});

async function fbSaveFds(weekKey, data) {
  try { await set(ref(db, `fds/${weekKey}`), data); }
  catch(e) { console.error("fbSaveFds:", e); setSyncStatus("offline"); }
}

async function fbSaveTask(task) {
  setSyncStatus("syncing");
  try { await set(ref(db, `tasks/${task.id}`), task); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbSaveTask:", e); }
}
async function fbDeleteTask(id) {
  setSyncStatus("syncing");
  try { await remove(ref(db, `tasks/${id}`)); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbDeleteTask:", e); }
}
async function fbUpdateTask(id, fields) {
  setSyncStatus("syncing");
  try { await update(ref(db, `tasks/${id}`), fields); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbUpdateTask:", e); }
}
async function fbSaveContact(contact) {
  setSyncStatus("syncing");
  try { await set(ref(db, `contacts/${contact.id}`), contact); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbSaveContact:", e); }
}
async function fbDeleteContact(id) {
  setSyncStatus("syncing");
  try { await remove(ref(db, `contacts/${id}`)); setSyncStatus("online"); }
  catch(e) { setSyncStatus("offline"); console.error("fbDeleteContact:", e); }
}

function setSyncStatus(s) {
  state.syncStatus = s;
  const el = document.getElementById("sync-badge");
  if (!el) return;
  if (s === "syncing") { el.textContent = "⏳ Sincronizando..."; el.className = "sync-badge syncing"; }
  else if (s === "online") { el.textContent = "🟢 Sincronizado"; el.className = "sync-badge"; }
  else { el.textContent = "🔴 Offline"; el.className = "sync-badge offline"; }
}

// ── RENDER ──────────────────────────────────────────────────────────
// safeRender: used by Firebase listeners — won't re-render if user is typing in a text input
function safeRender() {
  const active = document.activeElement;
  const inputTags = ["INPUT","TEXTAREA","SELECT"];
  const typingInputIds = ["main-input","travel-name-input","address-input","notes-input","contacts-search"];
  // Também protege qualquer input/textarea ativo em formulários de imóvel e contrato
  const inImovelForm = active && (active.closest?.('.imovel-inline-form') || active.closest?.('.imovel-form') || active.closest?.('.contrato-form') || active.closest?.('.contrato-edit-form') || active.closest?.('.contact-edit-form') || active.closest?.('.contact-form'));
  if (active && inputTags.includes(active.tagName) && (typingInputIds.includes(active.id) || active.classList.contains("fds-event-input") || (active.type==="date"||active.type==="time") || inImovelForm)) {
    // Update sync badge without full re-render
    setSyncStatus(state.syncStatus);
    return;
  }
  render();
}

function render() {
  const g = GROUPS.find(g => g.id === state.activeGroup);
  if (!g) return;
  document.documentElement.style.setProperty("--gc", g.color);
  const appEl = document.getElementById("app");
  if (appEl) appEl.innerHTML = buildApp();
}

function buildApp() {
  const groupTasks = state.tasks.filter(t => t.group === state.activeGroup);
  const pending = groupTasks.filter(t => !t.done);
  const done    = groupTasks.filter(t =>  t.done);
  const syncLabel = state.syncStatus === "syncing" ? "⏳ Sincronizando..."
    : state.syncStatus === "offline" ? "🔴 Offline" : "🟢 Sincronizado";
  const syncClass = state.syncStatus === "syncing" ? "sync-badge syncing"
    : state.syncStatus === "offline" ? "sync-badge offline" : "sync-badge";

  return `
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Concierge<br>Familiar</div>
        <div class="header-sub">Daniel &amp; Natalia</div>
      </div>
      <div id="sync-badge" class="${syncClass}">${syncLabel}</div>
    </div>
    <div class="groups-nav">
      ${GROUPS.map(g => `<button class="group-tab${g.id===state.activeGroup?" active":""}"
        style="${g.id===state.activeGroup?`background:${g.color}`:""}"
        onclick="setGroup('${g.id}')">${g.emoji} ${g.label}</button>`).join("")}
    </div>
  </div>
  <div class="content">
    <div class="sync-note">
      <span style="font-size:18px">☁️</span>
      <div class="sync-note-text"><strong>Sincronização em tempo real</strong> — alterações aparecem nos dois celulares instantaneamente.</div>
    </div>
    ${state.activeGroup === "contatos" ? buildContacts() : state.activeGroup === "imoveis" ? buildImoveis() : state.activeGroup === "fds" ? buildFDS() : buildTasksSection(pending, done, groupTasks)}
  </div>`;
}

function buildTasksSection(pending, done, groupTasks) {
  const pct = groupTasks.length > 0 ? Math.round((done.length/groupTasks.length)*100) : 0;
  return `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${pending.length}</div><div class="stat-lbl">Pendentes</div></div>
      <div class="stat-card"><div class="stat-num">${done.length}</div><div class="stat-lbl">Concluídas</div></div>
      <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-lbl">Progresso</div></div>
    </div>
    ${buildGroupHeader()}
    ${buildHouseSelector()}
    ${buildAddForm()}
    ${buildTaskLists(pending, done, groupTasks)}`;
}

function buildGroupHeader() {
  if (state.activeGroup === "viagens") return `
    <div class="travel-header">
      <div class="travel-header-title">✈️ Planejamento</div>
      <input id="travel-name-input" class="travel-name-input" placeholder="Nome da viagem (ex: Ushuaia Junho)"
        value="${esc(state.travelName)}">
      <div class="travel-date-row">
        <span class="travel-date-label">📅 Início:</span>
        <input id="travel-date-input" type="date" class="travel-date-input" value="${state.travelDate}"

function buildTaskLists(pending, done, groupTasks) {
  if (state.activeGroup==="viagens") return buildTravelList(pending, done);

  if (pending.length) html += `<div class="section-label">A FAZER</div><div class="task-list">${pending.map(buildTaskCard).join("")}</div>`;

function buildTravelList(pending, done) {
  const today = new Date().toISOString().split("T")[0];
  // Agrupar por viagem, guardando a data de início de cada grupo
  const trips = {};
  [...pending,...done].forEach(t => {
    const trip = t.travelName||"Próxima viagem";
    const cat  = t.travelCategory||"Outros";
    if (!trips[trip]) trips[trip] = { date: t.travelDate||null, cats: {} };
    // Se alguma tarefa da viagem tem data, usa a menor encontrada
    if (t.travelDate && (!trips[trip].date || t.travelDate < trips[trip].date))
      trips[trip].date = t.travelDate;
    if (!trips[trip].cats[cat]) trips[trip].cats[cat] = [];
    trips[trip].cats[cat].push(t);
  });
  if (!Object.keys(trips).length)
    return '<div class="empty"><div class="empty-icon">✈️</div><div>Nenhuma tarefa de viagem.</div></div>';

  // Ordenar viagens: com data em ordem crescente, sem data no final
  const sorted = Object.entries(trips).sort(([,a],[,b]) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date < b.date ? -1 : a.date > b.date ? 1 : 0;
  });

  return sorted.map(([trip, info]) => {
    const d = info.date;
    let dateLabel = "", dateClass = "";
    if (d) {
      const fmt = new Date(d+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"});
      if (d < today) { dateLabel = fmt + " · passada"; dateClass = "travel-trip-past"; }
      else if (d === today) { dateLabel = "Hoje · " + fmt; dateClass = "travel-trip-today"; }
      else { dateLabel = fmt; dateClass = "travel-trip-future"; }
    }
    const allTasks = Object.values(info.cats).flat();
    const doneCnt  = allTasks.filter(t=>t.done).length;
    return '<div class="travel-group-section">'
      + '<div class="travel-trip-title">✈️ ' + esc(trip)
      + (dateLabel ? ' <span class="travel-trip-date ' + dateClass + '">· ' + dateLabel + '</span>' : '')
      + '</div>'
      + Object.entries(info.cats).map(([cat, tasks]) =>
          '<div style="margin-bottom:16px">'
          + '<div class="travel-group-label">' + esc(cat)
          + ' <span class="travel-trip-name">' + tasks.filter(t=>t.done).length + '/' + tasks.length + '</span>'
          + '</div>'
          + '<div class="task-list">' + tasks.map(buildTaskCard).join("") + '</div>'
          + '</div>'
        ).join("")
      + '</div>';
  }).join("");
}

function buildShoppingList(pending, done) {
  const cats = {};
  [...pending,...done].forEach(t => {
    const cat = t.shoppingCategory||"Outros";
    if (!cats[cat]) cats[cat]=[];
    cats[cat].push(t);

  const sorted = [...SHOPPING_CATS.filter(c=>cats[c]),...Object.keys(cats).filter(c=>!SHOPPING_CATS.includes(c))];
  if (!sorted.length) return '<div class="empty"><div class="empty-icon">🛒</div><div>Nenhum item de compras.</div></div>';
  return sorted.map(cat =>

function buildHealthList(pending, done) {

function buildTaskCard(task) {
  const today = new Date().toISOString().split("T")[0];
  const overdue = task.dueDate && !task.done && task.dueDate < today;
  let dueFmt = task.dueDate
    ? new Date(task.dueDate+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"})
      + (task.dueTime?` às ${task.dueTime}`:"")
    : "";
  const h = task.house ? HOUSES.find(h=>h.id===task.house) : null;
  const mapsUrl = task.address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(task.address)}` : null;
  const isEditingNote = state.editingNotes[task.id];
  const isEditingDate = state.editingDateTime[task.id];
  const notesVal = state.notesVal[task.id]!==undefined ? state.notesVal[task.id] : (task.notes||"");

  // Date/time editor block — built with string concat to avoid template literal quote conflicts
  const tid = task.id;
  const dateEditorHtml = isEditingDate
    ? '<div class="date-edit-row">'
      + '<input id="de-date-' + tid + '" type="date" class="date-edit-input" value="' + (task.dueDate||'') + '"'
      + ' onchange="onTaskDateChange(' + tid + ',this.value)">'
      + '<input id="de-time-' + tid + '" type="time" class="date-edit-input" value="' + (task.dueTime||'') + '"'
      + (!task.dueDate ? ' disabled' : '') + ' onchange="state._dtEdit[' + tid + '].time=this.value">'
      + '<button class="date-edit-save" onclick="saveDateEdit(' + tid + ')">✓ Salvar</button>'
      + '<button class="date-edit-clear" onclick="clearDateEdit(' + tid + ')">🗑 Remover</button>'
      + '<button class="date-edit-cancel" onclick="cancelDateEdit(' + tid + ')">Cancelar</button>'
      + '</div>'
    : "";

  // Due tag — clickable when task is pending
  const dueClass = "due-tag" + (task.done ? " done-tag" : overdue ? " overdue" : "") + (task.done ? "" : " due-tag-clickable");
  const dueClick = task.done ? "" : ' onclick="startEditDate(' + tid + ')" title="Toque para editar data"';
  const duePrefix = task.done ? "✓ " : overdue ? "⚠ " : "📅 ";
  const dueDateHtml = dueFmt
    ? '<span class="' + dueClass + '"' + dueClick + '>' + duePrefix + esc(dueFmt) + '</span>'
    : "";

  return `<div class="task-card${task.done?" done":""}">
    <div class="task-row">
      <button class="check-btn${task.done?" done":""}" onclick="toggleTask(${task.id})">${task.done?"✓":""}</button>
      <div class="task-body">
        ${state.editingText[task.id] ? (
          '<input class="task-text-edit" id="te-' + task.id + '" value="' + esc(state.textVal[task.id]||task.text) + '" oninput="state.textVal[' + task.id + ']=this.value">'
          + '<div class="task-text-actions">'
          + '<button class="task-text-save" onclick="saveTaskText(' + task.id + ')">✓ Salvar</button>'
          + '<button class="task-text-cancel" onclick="cancelTaskText(' + task.id + ')">Cancelar</button>'
          + '</div>'
        ) : (
          '<div class="task-text' + (task.done?" done":"") + '" onclick="' + (task.done?"":"startEditText("+task.id+")") + '" title="' + (task.done?"":"Toque para editar") + '">' + esc(task.text) + '</div>'
        )}
        <div class="task-meta">
          <span class="meta-tag meta-tag-clickable" onclick="startEditAssignee(${task.id})" title="Toque para editar">👤 ${task.assignee}</span>
          ${h?`<span class="house-tag">${h.emoji} ${h.label}</span>`:""}
          ${dueDateHtml}
          <span>${task.createdAt}</span>
        </div>
      </div>
      <button class="delete-btn" onclick="deleteTask(${task.id})">✕</button>
    </div>
    ${dateEditorHtml}
    ${state.editingAssignee[task.id] ? (() => {
      const cur = state.editingAssignee[task.id];
      return '<div class="assignee-edit-row">'
        + '<span class="assignee-edit-label">Para:</span>'
        + ASSIGNEES.map(a => '<button class="assignee-edit-btn' + (a===cur?' active':'') + '" onclick="pickAssignee(' + task.id + ',' + JSON.stringify(a) + ')">' + a + '</button>').join('')
        + '<button class="assignee-edit-save" onclick="saveAssignee(' + task.id + ')">✓</button>'
        + '<button class="date-edit-cancel" onclick="cancelAssigneeEdit(' + task.id + ')">✕</button>'
        + '</div>';
    })() : ""}
    ${!task.dueDate && !isEditingDate && !task.done ? `<button class="add-due-btn" onclick="startEditDate(${task.id})">📅 Adicionar prazo</button>` : ""}
    ${mapsUrl?`<div class="task-address"><a href="${mapsUrl}" target="_blank" class="map-link">📍 ${esc(task.address)}</a></div>`:""}

function imovelStatusClass(s) {
  if (!s) return "";
  if (s === "Locado") return "locado";
  if (s === "Em construção") return "construcao";
  if (s === "À venda") return "venda";
  if (s === "Vendido") return "vendido";
  return "";
}

function fmtMoeda(v) {
  if (!v) return "";
  // Trata tanto "1.200.000,50" (pt-BR) quanto "1200000.50" (en)
  let s = String(v).replace(/[R$\s]/g,"").trim();
  // Se tem vírgula e ponto: "1.200,50" → remover ponto, trocar vírgula por ponto
  if (s.includes(",") && s.includes(".")) s = s.replace(/\./g,"").replace(",",".");
  // Se só tem vírgula: "1200,50" → trocar por ponto
  else if (s.includes(",")) s = s.replace(",",".");
  const n = parseFloat(s);
  if (isNaN(n)) return v;
  return "R$ " + n.toLocaleString("pt-BR", {minimumFractionDigits:0, maximumFractionDigits:2});
}

function fmtData(d) {
  if (!d) return "";
  return new Date(d+"T12:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
}

    '<div class="imovel-field">' +

    '<input id="' + p + '-' + id + '" class="imovel-field-input" type="' + (type||"text") + '" placeholder="' + ph + '" value="' + esc(val||"") + '">' +
    '</div>';
  const sel = (label, id, opts, val) =>
    '<div class="imovel-field">' +

    '<select id="' + p + '-' + id + '" class="imovel-field-select">' +
    opts.map(o => '<option value="' + o + '"'+ (o===(val||opts[0])?' selected':'') +'>' + o + '</option>').join("") +

function buildResumoPainel() {
  const total = state.imoveis.length;
  if (total === 0) return "";

  // Soma valor pago usando fmtMoeda logic
  let somaValorPago = 0;
  state.imoveis.forEach(im => {
    if (!im.valorPago) return;
    let s = String(im.valorPago).replace(/[R$\s]/g,"").trim();
    if (s.includes(",") && s.includes(".")) s = s.replace(/\./g,"").replace(",",".");
    else if (s.includes(",")) s = s.replace(",",".");
    const n = parseFloat(s);
    if (!isNaN(n)) somaValorPago += n;
  });

  // Contar por TIPO de imóvel
  const porTipo = {};
  state.imoveis.forEach(im => {
    const t = im.tipo || "Outros";
    porTipo[t] = (porTipo[t] || 0) + 1;
  });

  const fmtBig = (n) => {
    if (n === 0) return "R$ 0";
    if (n >= 1e6) return "R$ " + (n/1e6).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:2}) + "M";
    if (n >= 1e3) return "R$ " + (n/1e3).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:1}) + "k";
    return "R$ " + n.toLocaleString("pt-BR");
  };

  const tipoItems = IMOVEL_TIPOS
    .filter(t => porTipo[t])
    .map(t => '<div class="imovel-resumo-item">'

window.toggleContratoForm = function(imId) {
  state.showContratoForm[imId] = !state.showContratoForm[imId];
  state.editingContratoId[imId] = null;
  render();
};

window.startEditContrato = function(imId, ctId) {
  state.editingContratoId[imId] = state.editingContratoId[imId] === ctId ? null : ctId;
  state.showContratoForm[imId] = false;
  render();
};

window.cancelContrato = function(imId, ctId) {
  if (ctId === 'new') state.showContratoForm[imId] = false;
  else state.editingContratoId[imId] = null;
  render();
};

function readContratoFields(imId, ctId) {
  const g = f => { const el = document.getElementById('cf-'+f+'-'+imId+'-'+ctId); return el ? el.value.trim() : ""; };
  return { titulo: g('titulo'), tipo: g('tipo'), data: g('data'), link: g('link'), notas: g('notas') };
}

window.saveContrato = async function(imId, ctId) {
  const im = state.imoveis.find(i => i.id === imId);
  if (!im) return;
  const data = readContratoFields(imId, ctId);
  if (!data.titulo) { alert("Título do contrato é obrigatório"); return; }
  if (!im.contratos) im.contratos = {};
  const newId = ctId === 'new'
    ? String(Date.now() * 1000 + Math.floor(Math.random() * 1000))
    : ctId;
  // Preserva PDF existente se não houve novo upload
  const existing = im.contratos[newId] || {};
  const pdfKey = imId + '-' + ctId;
  const pdfTemp = state._pdfTemp && state._pdfTemp[pdfKey];
  const pdfData = pdfTemp ? pdfTemp.data : existing.pdfData;
  const pdfNome = pdfTemp ? pdfTemp.nome : existing.pdfNome;
  im.contratos[newId] = { ...data, id: newId,
    ...(pdfData ? { pdfData, pdfNome } : {}) };
  if (pdfTemp && state._pdfTemp) delete state._pdfTemp[pdfKey];
  if (ctId === 'new') state.showContratoForm[imId] = false;
  else state.editingContratoId[imId] = null;
  render();
  await fbSaveImovel(im);
};

window.deleteContrato = async function(imId, ctId) {
  if (!confirm("Remover este contrato?")) return;
  const im = state.imoveis.find(i => i.id === imId);
  if (!im || !im.contratos) return;
  delete im.contratos[ctId];
  state.editingContratoId[imId] = null;
  render();
  await fbSaveImovel(im);
};


// ── PDF DE CONTRATO ────────────────────────────────────────────────
window.handleContratoPdf = function(imId, ctId, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 4 * 1024 * 1024) {
    alert("PDF muito grande. Tamanho máximo: 4MB. Tente comprimr o arquivo.");
    return;
  }
  const nameEl = document.getElementById('cf-pdf-name-'+imId+'-'+ctId);
  if (nameEl) nameEl.textContent = "⏳ Carregando " + file.name + "...";
  const reader = new FileReader();
  reader.onload = e => {
    // Guarda temporariamente no state para salvar junto com saveContrato
    if (!state._pdfTemp) state._pdfTemp = {};
    state._pdfTemp[imId+'-'+ctId] = { data: e.target.result, nome: file.name };
    if (nameEl) nameEl.textContent = "✅ " + file.name;
  };
  reader.readAsDataURL(file);
};

window.removeContratoPdf = async function(imId, ctId) {
  const im = state.imoveis.find(i => i.id === imId);
  if (!im || !im.contratos) return;
  const ct = ctId === 'new' ? null : im.contratos[ctId];
  if (ct) { delete ct.pdfData; delete ct.pdfNome; }
  if (state._pdfTemp) delete state._pdfTemp[imId+'-'+ctId];
  render();
  if (ct) await fbSaveImovel(im);
};

// Text fields that should NOT trigger render while typing
const NO_RENDER_KEYS = new Set(["input","address","notes","contactSearch","travelName"]);
// Captura os valores dos inputs não-controlados antes de qualquer render()
function snapFormInputs() {
  const v = (id) => { const el = document.getElementById(id); return el ? el.value : null; };
  const main = v("main-input");        if (main    !== null) state._snap_main    = main;
  const addr = v("address-input");     if (addr    !== null) state._snap_address = addr;
  const note = v("notes-input");       if (note    !== null) state._snap_notes   = note;
  const tname= v("travel-name-input"); if (tname   !== null) state.travelName    = tname;
  const tdate= v("travel-date-input"); if (tdate   !== null) state.travelDate    = tdate;
}

// Restaura os valores nos inputs após render()
function restoreFormInputs() {
  const s = (id, val) => { const el = document.getElementById(id); if (el && val !== undefined) el.value = val; };
  s("main-input",    state._snap_main);
  s("address-input", state._snap_address);
  s("notes-input",   state._snap_notes);
}

window.S = function(key, val) {
  snapFormInputs();   // salva o que o usuário digitou
  state[key] = val;
  if (NO_RENDER_KEYS.has(key)) return;
  render();
  restoreFormInputs(); // recoloca os valores após render
};
window.setGroup = function(id) {

  if (tn) state.travelName = tn.value.trim();

window.addTask = async function() {
  const mainInput    = document.getElementById("main-input");
  const addressInput = document.getElementById("address-input");
  const notesInput   = document.getElementById("notes-input");
  const travelInput  = document.getElementById("travel-name-input");
  const text = mainInput ? mainInput.value.trim() : "";
  if (!text) return;
  const address    = addressInput ? addressInput.value.trim() : "";
  const notes      = notesInput   ? notesInput.value.trim()   : "";
  const travelName = travelInput  ? travelInput.value.trim()  : state.travelName;
  if (travelInput) state.travelName = travelName;
  const task = {
    id: Date.now() * 1000 + Math.floor(Math.random() * 1000),
    text, group: state.activeGroup, assignee: state.assignee,
    done: false, dueDate: state.dueDate||null, dueTime: state.dueTime||null,
    address: address||null, notes: notes||null,
    house: (state.activeGroup==="casa"||state.activeGroup==="compras") ? state.selectedHouse : null,
    createdAt: new Date().toLocaleDateString("pt-BR"),
    ...(state.activeGroup==="viagens"&&{travelName:travelName||"Próxima viagem",travelDate:state.travelDate||null,travelCategory:state.travelCategory}),
    ...(state.activeGroup==="saude"&&{healthCategory:state.healthCategory}),
    ...(state.activeGroup==="compras"&&{shoppingCategory:state.shoppingCategory}),
  };
  state.dueDate=""; state.dueTime="";
  render();
  await fbSaveTask(task);
  setTimeout(()=>{ const el=document.getElementById("main-input"); if(el){ el.value=""; el.focus(); } },50);
};

function buildContactsList() {
  const filtered = state.contacts.filter(c =>
    !state.contactSearch ||
    c.name.toLowerCase().includes(state.contactSearch.toLowerCase()) ||
    (c.company||"").toLowerCase().includes(state.contactSearch.toLowerCase()) ||
    (c.city||"").toLowerCase().includes(state.contactSearch.toLowerCase())
  );
  const grouped = {};
  filtered.forEach(c => { const s=c.section||"Outros"; if(!grouped[s])grouped[s]=[]; grouped[s].push(c); });
  const sorted = [...CONTACT_SECS.filter(s=>grouped[s]),...Object.keys(grouped).filter(s=>!CONTACT_SECS.includes(s))];
  if (!sorted.length) return '<div class="empty"><div class="empty-icon">👥</div><div>Nenhum contato ainda.</div></div>';
  return sorted.map(sec =>
    '<div class="contacts-section-label">'+esc(sec)+'</div>'
    + grouped[sec].map(c => {
        const isEditing = state.editingContactId === c.id;
        return '<div class="contact-card" style="flex-direction:column;align-items:stretch">'
          + '<div style="display:flex;align-items:center;gap:12px">'
          + (c.photo
              ? '<img src="'+c.photo+'" class="contact-avatar" alt="'+esc(c.name)+'">'
              : '<div class="contact-avatar-placeholder">👤</div>')
          + '<div class="contact-info">'
          + '<div class="contact-name">'+esc(c.name)+'</div>'
          + (c.company||c.city ? '<div class="contact-company">'+esc(c.company||'')+(c.company&&c.city?' · ':'')+esc(c.city||'')+'</div>' : '')
          + '<div class="contact-links">'
          + (c.phone ? '<a href="tel:'+esc(c.phone)+'" class="contact-link">📱 '+esc(c.phone)+'</a>' : '')
          + (c.email ? '<a href="mailto:'+esc(c.email)+'" class="contact-link">📧 '+esc(c.email)+'</a>' : '')
          + (c.site  ? '<a href="'+(c.site.startsWith('http')?c.site:'https://'+c.site)+'" target="_blank" class="contact-link">🌐 Site</a>' : '')
          + '</div></div>'
          + '<button class="contact-delete-btn" onclick="startContactEdit('+c.id+')" title="Editar">✏️</button>'
          + '</div>'
          + (isEditing ? buildContactEditForm(c) : '')
          + '</div>';
      }).join('')
  ).join('');
}


// ── CONTACT EDIT ───────────────────────────────────────────────────
window.startContactEdit = function(id) {
  state.editingContactId = state.editingContactId === id ? null : id;
  const listEl = document.getElementById("contacts-list");
  if (listEl) listEl.innerHTML = buildContactsList();
};
window.cancelContactEdit = function() {
  state.editingContactId = null;
  const listEl = document.getElementById("contacts-list");
  if (listEl) listEl.innerHTML = buildContactsList();
};
window.triggerContactPhotoEdit = function(id) {
  document.getElementById("contact-photo-edit-"+id)?.click();
};
window.handleContactPhotoEdit = function(input, id) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const contact = state.contacts.find(c=>c.id===id);
    if (!contact) return;
    contact.photo = e.target.result;
    const listEl = document.getElementById("contacts-list");
    if (listEl) listEl.innerHTML = buildContactsList();
    await fbSaveContact(contact);
  };
  reader.readAsDataURL(file);
};
window.saveContactEdit = async function(id) {
  const contact = state.contacts.find(c=>c.id===id);
  if (!contact) return;
  const v = (f) => { const el = document.getElementById("ce-"+f+"-"+id); return el ? el.value.trim() : contact[f]||""; };
  contact.name    = v("name");
  contact.company = v("company");
  contact.city    = v("city");
  contact.phone   = v("phone");
  contact.site    = v("site");
  contact.email   = v("email");
  const secEl = document.getElementById("ce-section-"+id);
  if (secEl) contact.section = secEl.value;
  state.editingContactId = null;
  const listEl = document.getElementById("contacts-list");
  if (listEl) listEl.innerHTML = buildContactsList();
  await fbSaveContact(contact);
};
window.toggleContactForm = function() { state.showContactForm=!state.showContactForm; state.contactSearch=""; render(); };
window.setCF = function(f,v) { state.cf[f]=v; };
window.triggerPhotoUpload = function() { document.getElementById("photo-input")?.click(); };
window.handlePhotoUpload = function(input) {
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{ state.cf.photo=e.target.result; render(); };
  reader.readAsDataURL(file);
};
window.saveContact = async function() {
  if (!state.cf.name.trim()) { alert("Nome é obrigatório"); return; }
  const contact = { ...state.cf, id: Date.now() * 1000 + Math.floor(Math.random() * 1000) };
  state.cf={ photo:null,name:"",company:"",section:"Outros",city:"",phone:"",site:"",email:"" };
  state.showContactForm=false;
  render();
  await fbSaveContact(contact);
};
window.deleteContact = async function(id) {
  if (!confirm("Remover este contato?")) return;
  await fbDeleteContact(id);
};



// ── ASSIGNEE EDIT ON TASK CARDS ────────────────────────────────────
window.startEditAssignee = function(id) {
  const task = state.tasks.find(t=>t.id===id);
  if (!task || task.done) return;
  state.editingAssignee = {};           // fecha outros abertos
  state.editingAssignee[id] = task.assignee; // valor atual como selecionado
  render();
};
window.pickAssignee = function(id, val) {
  state.editingAssignee[id] = val;       // atualiza seleção sem render completo
  // Atualiza visual dos botões sem re-render
  const row = document.querySelector('.assignee-edit-row');
  if (row) row.querySelectorAll('.assignee-edit-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === val);
  });
};
window.saveAssignee = async function(id) {
  const newAssignee = state.editingAssignee[id];
  if (!newAssignee) return;
  const task = state.tasks.find(t=>t.id===id);
  if (task) task.assignee = newAssignee;
  delete state.editingAssignee[id];
  render();
  await fbUpdateTask(id, { assignee: newAssignee });
};
window.cancelAssigneeEdit = function(id) {
  delete state.editingAssignee[id];
  render();
};

// ── DATE/TIME EDIT ON TASK CARDS ───────────────────────────────────
window.startEditDate = function(id) {
  const task = state.tasks.find(t=>t.id===id);
  if (!task || task.done) return;
  // Close any other open date editors
  state.editingDateTime = {};
  state.editingDateTime[id] = true;
  // Seed scratch values from task
  state._dtEdit[id] = { date: task.dueDate||"", time: task.dueTime||"" };
  render();
};

window.cancelDateEdit = function(id) {
  delete state.editingDateTime[id];
  delete state._dtEdit[id];
  render();
};

// Called when date picker changes — enable/disable time, update scratch
window.onTaskDateChange = function(id, val) {
  if (!state._dtEdit[id]) state._dtEdit[id] = {};
  state._dtEdit[id].date = val;
  // Enable/disable time input inline without re-render
  const timeEl = document.getElementById("de-time-"+id);
  if (timeEl) {
    timeEl.disabled = !val;
    if (!val) { timeEl.value = ""; state._dtEdit[id].time = ""; }
  }
};

window.saveDateEdit = async function(id) {
  const scratch = state._dtEdit[id] || {};
  // Read directly from DOM inputs in case user typed without triggering onchange
  const dateEl = document.getElementById("de-date-"+id);
  const timeEl = document.getElementById("de-time-"+id);
  const newDate = (dateEl ? dateEl.value : scratch.date) || null;
  const newTime = (timeEl && !timeEl.disabled ? timeEl.value : "") || null;

  // Update local state immediately for instant feedback
  const task = state.tasks.find(t=>t.id===id);
  if (task) { task.dueDate = newDate; task.dueTime = newTime; }
  delete state.editingDateTime[id];
  delete state._dtEdit[id];
  render();
  await fbUpdateTask(id, { dueDate: newDate, dueTime: newTime });
};

window.clearDateEdit = async function(id) {
  const task = state.tasks.find(t=>t.id===id);
  if (task) { task.dueDate = null; task.dueTime = null; }
  delete state.editingDateTime[id];
  delete state._dtEdit[id];
  render();
  await fbUpdateTask(id, { dueDate: null, dueTime: null });
};

function buildFDS() {
  const today = new Date().toISOString().split("T")[0];
  const allWeeks = generateWeekends();
  const pastCount = allWeeks.filter(w => w.sunKey < today).length;
  const weeks = state.hidePast ? allWeeks.filter(w => w.sunKey >= today) : allWeeks;

  const buildTable = (title, emoji, whoKey, opts, greenVal) => {
    const rows = weeks.map(w => {
      const saved = state.fds[w.key] || {};
      const who = saved[whoKey] !== undefined ? saved[whoKey] : (whoKey==="isa_who" ? w.isaDefault : w.joaDefault);
      const event = saved.event !== undefined ? saved.event : w.event;
      const green = who === greenVal;
      const rc = green ? "fds-row-green" : "fds-row-white";
      const selStyle = green ? ' style="color:#fff"' : '';
      return '<tr class="'+rc+'">'
        + '<td><select class="fds-who-select" onchange="saveFdsWho(\''+w.key+'\',\''+whoKey+'\',this.value)"'+selStyle+'>'
        + opts.map(o => '<option value="'+o+'"'+(o===who?' selected':'')+'>'+o+'</option>').join('')
        + '</select></td>'
        + '<td>'+w.fri+'</td><td>'+w.sat+'</td><td>'+w.sun+'</td>'
        + '</tr>'
        + '<tr class="fds-obs-row"><td colspan="4"><div class="fds-obs-inner">'
        + '<textarea class="fds-event-input" rows="1" placeholder="★ Adicionar evento..." onblur="saveFdsEvent(\''+w.key+'\',this.value)" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();this.blur()}">'+esc(event)+'</textarea>'
        + '</div></td></tr>';
    }).join('');
    return '<div class="fds-col">'
      + '<div class="fds-block-title">'+emoji+' '+title+'</div>'
      + '<div class="fds-block"><div class="fds-wrapper"><table class="fds-table">'
      + '<thead><tr><th>Quem</th><th>Sex</th><th>Sab</th><th>Dom</th></tr></thead>'
      + '<tbody>'+rows+'</tbody></table></div></div></div>';
  };

  const toggleLabel = state.hidePast
    ? '👁 Ver passados ('+pastCount+')'
    : '🙈 Ocultar passados';

  return '<div>'
    + '<div style="display:flex;justify-content:flex-end;margin-bottom:12px">'
    + '<button onclick="toggleHidePast()" style="background:#1C1C1E;color:#F5F0E8;border:none;border-radius:20px;padding:7px 16px;font-family:DM Sans,sans-serif;font-size:12px;font-weight:500;cursor:pointer">'
    + toggleLabel+'</button></div>'
    + '<div class="fds-outer">'
    + buildTable("Isabelle","👧","isa_who",["Daniel","Daiana"],"Daniel")
    + buildTable("Joaquim","👦","joa_who",["Natalia","Itamar"],"Natalia")
    + '</div></div>';
}

window.saveFdsWho = async function(weekKey, field, val) {
  const cur = state.fds[weekKey] || {};
  const upd = Object.assign({}, cur, {[field]: val});
  state.fds[weekKey] = upd;
  render();
  await fbSaveFds(weekKey, upd);
};

window.toggleHidePast = function() { state.hidePast = !state.hidePast; render(); };

window.saveFdsEvent = async function(weekKey, val) {
  const cur = state.fds[weekKey] || {};
  const upd = Object.assign({}, cur, {event: val.trim()});
  state.fds[weekKey] = upd;
  await fbSaveFds(weekKey, upd);
};

function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
